      group.position.set(0, 0, 0);
      group.scale.setScalar(JAR_DISPLAY_SCALE);

      const outerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      outerUniforms.uDispScale.value = initialData.dispScale;
      outerUniforms.uAppear.value = 0;
      applyColorsFromShift(outerUniforms, initialData.colorShift);
      snapshotColorsToPrev(outerUniforms);

      const outerGeo = new THREE.LatheGeometry(initialData.profile, LATHE_SEGMENTS);
      outerGeo.computeVertexNormals();
      const outer = new THREE.Mesh(outerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: outerUniforms,
        transparent: true,
        side: THREE.FrontSide,
        depthWrite: true
      }));
      group.add(outer);

      const innerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      innerUniforms.uInterior.value = 1;
      innerUniforms.uDispScale.value = initialData.dispScale * 0.32;
      innerUniforms.uAppear.value = 0;
      innerUniforms.uTime = outerUniforms.uTime;
      applyColorsFromShift(innerUniforms, initialData.colorShift);
      snapshotColorsToPrev(innerUniforms);

      const innerGeo = new THREE.LatheGeometry(createInnerProfile(initialData.profile), LATHE_SEGMENTS - 16);
      innerGeo.computeVertexNormals();
      const inner = new THREE.Mesh(innerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: innerUniforms,
        transparent: true,
        side: THREE.BackSide,
        depthWrite: false
      }));
      group.add(inner);

      const meniscus = new THREE.Mesh(
        new THREE.CircleGeometry(initialData.mouthR * 0.82, 28),
        new THREE.MeshBasicMaterial({
          color: midColorFromShift(initialData.colorShift),
          transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false
        })
      );
      meniscus.rotation.x = -Math.PI / 2;
      meniscus.position.set(0, initialData.mouthY, 0);
      group.add(meniscus);

      fieldGroup.add(group);

      return {
        group,
        outer,
        inner,
        meniscus,
        outerUniforms,
        innerUniforms,
        latheSegments: LATHE_SEGMENTS,
        innerSegments: Math.max(48, LATHE_SEGMENTS - 16),
        baseMouthR: initialData.mouthR,
        timeOffset: initialData.formSeed * 0.01
      };
    }

    function easeSineOut(t) {
      return Math.sin(t * Math.PI * 0.5);
    }

    function easeSineInOut(t) {
      return -(Math.cos(Math.PI * t) - 1) * 0.5;
    }

    let birthState = null;

    function runWaterBirth(jar, targetData, onComplete) {
      snapshotJarColorsToPrev(jar);
      applyColorsFromShift(jar.outerUniforms, targetData.colorShift);
      applyColorsFromShift(jar.innerUniforms, targetData.colorShift);
      jar.outerUniforms.uColorMorphT.value = 0;
      jar.innerUniforms.uColorMorphT.value = 0;
      jar.outerUniforms.uFormSeed.value = targetData.formSeed;
      jar.innerUniforms.uFormSeed.value = targetData.formSeed;
      jar.outerUniforms.uSurfaceType.value = targetData.surfaceType;
      jar.innerUniforms.uSurfaceType.value = targetData.surfaceType;
      jar.outerUniforms.uDispScale.value = targetData.dispScale;
      jar.innerUniforms.uDispScale.value = targetData.dispScale * 0.32;
      jar.outerUniforms.uJarYMin.value = targetData.yMin;
      jar.outerUniforms.uJarYRange.value = targetData.yRange;
      jar.innerUniforms.uJarYMin.value = targetData.yMin;
      jar.innerUniforms.uJarYRange.value = targetData.yRange;
      jar.outerUniforms.uBirthActive.value = 0;
      jar.innerUniforms.uBirthActive.value = 0;
      jar.outerUniforms.uBirthProgress.value = 1;
      jar.innerUniforms.uBirthProgress.value = 1;
      jar.outerUniforms.uBecoming.value = 0.22;
      jar.innerUniforms.uBecoming.value = 0.22;
      applyProfileGeometryToJar(jar, targetData);
      birthState = {
        jar,
        targetData,
        startTime: performance.now(),
        duration: BIRTH_DURATION * 1000,
        onComplete
      };
      setMorphingState(jar, false);
    }

    function updateBirthAnimation(now) {
      if (!birthState) return;
      const { jar, targetData, startTime, duration, onComplete } = birthState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const t = easeSineOut(rawT);

      jar.outerUniforms.uBirthProgress.value = t;
      jar.innerUniforms.uBirthProgress.value = t;
      jar.outerUniforms.uBecoming.value = 0.35 + t * 0.65;
      jar.innerUniforms.uBecoming.value = jar.outerUniforms.uBecoming.value;
      setColorMorphProgress(jar, t);
      jar.outerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.innerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.meniscus.material.opacity = Math.min(0.22, Math.max(0, (t - 0.85) * 1.6));

      if (rawT >= 1) {
        applyProfileGeometryToJar(jar, targetData);
        applyShapeUniforms(jar, targetData);
        finishColorMorph(jar, targetData.colorShift);
        jar.outerUniforms.uAppear.value = 1;
        jar.innerUniforms.uAppear.value = 1;
        jar.meniscus.material.opacity = 0.22;
        jar.outerUniforms.uBirthActive.value = 0;
        jar.innerUniforms.uBirthActive.value = 0;
        jar.outerUniforms.uBirthProgress.value = 1;
        jar.innerUniforms.uBirthProgress.value = 1;
        jar.outerUniforms.uBecoming.value = 0.16;
        jar.innerUniforms.uBecoming.value = 0.16;
        setMorphingState(jar, false);
        birthState = null;
        if (onComplete) onComplete();
      }
    }

    let morphJar = null;
    let morphSeed = Math.floor(Math.random() * 999999);
    let morphGen = 0;
    let currentForm = null;
    let morphState = null;
    let morphTimer = null;
    const morphPrefetch = { target: null, gen: -1, busy: false };
    const morphScratch = {
      profile: [],
      inner: [],
      geo: {
        profile: null,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: 0,
        mouthY: 0
      }
    };

    function prefetchNextMorph() {
      if (morphPrefetch.busy || !currentForm) return;
      morphPrefetch.busy = true;
      const nextGen = morphGen + 1;
      const seed = morphSeed + nextGen * 7919 + userInfluenceSeedBonus();
      const fromSnapshot = currentForm;
      const run = () => {
        try {
          morphPrefetch.target = profileDataContrasting(fromSnapshot, seed, nextGen);
          morphPrefetch.gen = nextGen;
        } finally {
          morphPrefetch.busy = false;
        }
      };
      if (typeof requestIdleCallback !== 'undefined') {
        requestIdleCallback(run, { timeout: 3000 });
      } else {
        setTimeout(run, 32);
      }
    }

    function resolveMorphTarget() {
      if (morphPrefetch.target && morphPrefetch.gen === morphGen) {
        const target = morphPrefetch.target;
        morphPrefetch.target = null;
        morphPrefetch.gen = -1;
        return target;
      }
      return profileDataContrasting(
        currentForm,
        morphSeed + morphGen * 7919 + userInfluenceSeedBonus(),
        morphGen
      );
    }

    function lerpProfileInto(fromData, toData, t, out) {
      const ease = smoothMorphT(t);
      const n = Math.min(fromData.profile.length, toData.profile.length);
      while (out.length < n) out.push(new THREE.Vector2());
      for (let i = 0; i < n; i++) {
        out[i].x = fromData.profile[i].x + (toData.profile[i].x - fromData.profile[i].x) * ease;
        out[i].y = fromData.profile[i].y + (toData.profile[i].y - fromData.profile[i].y) * ease;
      }
      out.length = n;
      syncBaseWithBody(out);
      morphScratch.geo.profile = out;
      morphScratch.geo.mouthR = fromData.mouthR + (toData.mouthR - fromData.mouthR) * ease;
      morphScratch.geo.mouthY = fromData.mouthY + (toData.mouthY - fromData.mouthY) * ease;
      return morphScratch.geo;
    }

    function updateMorphAnimation(now) {
      if (!morphState) return;
      const { from, to, startTime, duration } = morphState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const t = easeSineInOut(rawT);

      lerpProfileInto(from, to, t, morphScratch.profile);
      const geo = profileWithUserSculpt(morphScratch.geo);
      const shouldUpdateGeo = (now - perf.lastGeoUpdate) >= perf.geoInterval;
      if (shouldUpdateGeo || rawT >= 1) {
        perf.morphGeoFrame++;
        applyProfileGeometryToJar(morphJar, geo, morphScratch.inner, {
          skipInner: perf.tier >= 3 || (perf.tier >= 2 && perf.morphGeoFrame % 2 === 1)
        });
        perf.lastGeoUpdate = now;
      }
      applyAppearanceLerp(morphJar, from, to, t, morphState.startBecoming);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;

      if (rawT >= 1) {
        applyProfileGeometryToJar(morphJar, to);
        applyShapeUniforms(morphJar, to);
        finishColorMorph(morphJar, to.colorShift);
        setMorphingState(morphJar, false);
        morphJar.outerUniforms.uBecoming.value = 0.16;
        morphJar.innerUniforms.uBecoming.value = 0.16;
        morphJar.outerUniforms.uBirthActive.value = 0;
        morphJar.innerUniforms.uBirthActive.value = 0;
        morphJar.outerUniforms.uBirthProgress.value = 1;
        morphJar.innerUniforms.uBirthProgress.value = 1;
        currentForm = to;
        morphState = null;
        rememberForm(to);
        morphTimer = setTimeout(scheduleNextMorph, HOLD_DURATION * 1000);
        prefetchNextMorph();
      }
    }

    function scheduleNextMorph() {
      if (morphTimer) clearTimeout(morphTimer);
      morphGen++;
      const targetForm = resolveMorphTarget();
      for (let i = 0; i < userInfluence.sculptBias.length; i++) {
        userInfluence.sculptBias[i] *= 0.32;
      }
      userInfluence.scrollEnergy *= 0.35;
      userInfluence.sculptDirty = true;
      beginColorMorph(morphJar, targetForm.colorShift);
      setMorphingState(morphJar, true);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;
      morphJar.outerUniforms.uBirthProgress.value = 1;
      morphJar.innerUniforms.uBirthProgress.value = 1;
      perf.morphGeoFrame = 0;
      perf.lastGeoUpdate = 0;
      morphState = {
        from: currentForm,
        to: targetForm,
        startTime: performance.now(),
        duration: MORPH_DURATION * 1000,
        startBecoming: morphJar.outerUniforms.uBecoming.value
      };
      prefetchNextMorph();
    }

    function initMorphingJar() {
      morphSeed = Math.floor(Math.random() * 999999);
      morphGen = 1;
      recentFormHistory = [];
      recentArchetypeHistory = [];
      const startArchetype = FORM_ARCHETYPES[Math.floor(Math.random() * FORM_ARCHETYPES.length)].id;
      currentForm = buildProfileData(mulberry32(morphSeed), startArchetype, morphSeed);
      rememberForm(currentForm);
      morphJar = buildMorphingJar(currentForm);
      runWaterBirth(morphJar, currentForm, () => {
        morphTimer = setTimeout(scheduleNextMorph, 420);
        prefetchNextMorph();
      });
    }

    // ── User Interaction · 생성 개입 ───────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouseNdc = new THREE.Vector2();
    const userInfluence = {
      pointer: { x: 0.5, y: 0.5 },
      mouseWorld: new THREE.Vector3(999, 999, 999),
      mouseStrength: 0,
      dragging: false,
      lastDragX: 0,
      lastDragY: 0,
      sculptBias: new Float32Array(PROFILE_POINTS),
      scrollEnergy: 0,
      sculptDirty: false
    };

    function userInfluenceSeedBonus() {
      let sum = 0;
      for (let i = 0; i < userInfluence.sculptBias.length; i++) {
        sum += Math.abs(userInfluence.sculptBias[i]);
      }
      return Math.floor(
        sum * 14000
        + userInfluence.pointer.x * 173
        + userInfluence.pointer.y * 811
        + userInfluence.scrollEnergy * 97
      );
    }

    function decaySculptBias(factor = 0.986) {
      let changed = false;
      for (let i = 0; i < userInfluence.sculptBias.length; i++) {
        const prev = userInfluence.sculptBias[i];
        userInfluence.sculptBias[i] *= factor;
        if (Math.abs(userInfluence.sculptBias[i]) < 0.0008) userInfluence.sculptBias[i] = 0;
        if (Math.abs(userInfluence.sculptBias[i] - prev) > 1e-6) changed = true;
      }
      if (changed) userInfluence.sculptDirty = true;
    }

    function screenYToHeightT(clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      return Math.min(1, Math.max(0, 1 - (clientY - rect.top) / rect.height));
    }

    function sculptAtHeightT(t, amount) {
      for (let i = 0; i < PROFILE_POINTS; i++) {
        const pt = i / Math.max(PROFILE_POINTS - 1, 1);
        const w = Math.exp(-Math.pow((pt - t) / 0.09, 2));
        userInfluence.sculptBias[i] += amount * w;
        userInfluence.sculptBias[i] = Math.max(-0.28, Math.min(0.38, userInfluence.sculptBias[i]));
      }
      userInfluence.sculptDirty = true;
    }

    function updateMouseFromEvent(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNdc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouseNdc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      userInfluence.pointer.x = (mouseNdc.x + 1) * 0.5;
      userInfluence.pointer.y = (mouseNdc.y + 1) * 0.5;
    }

    function updateMouseRaycast() {
      if (!morphJar) return;
      raycaster.setFromCamera(mouseNdc, camera);
      const hits = raycaster.intersectObject(morphJar.outer, false);
      if (hits.length) {
        userInfluence.mouseWorld.copy(hits[0].point);
        userInfluence.mouseStrength += (0.95 - userInfluence.mouseStrength) * 0.14;
      } else {
        userInfluence.mouseStrength += (0 - userInfluence.mouseStrength) * 0.1;
      }
      morphJar.outerUniforms.uMousePoint.value.copy(userInfluence.mouseWorld);
      morphJar.innerUniforms.uMousePoint.value.copy(userInfluence.mouseWorld);
      morphJar.outerUniforms.uMouseInfluence.value = userInfluence.mouseStrength;
      morphJar.innerUniforms.uMouseInfluence.value = userInfluence.mouseStrength;
    }

    function updateFieldLean() {
      const targetY = (userInfluence.pointer.x - 0.5) * 0.11;
      const targetX = (userInfluence.pointer.y - 0.5) * -0.05;
      fieldGroup.rotation.y += (targetY - fieldGroup.rotation.y) * 0.045;
      fieldGroup.rotation.x += (targetX - fieldGroup.rotation.x) * 0.045;
    }

    function updateUserInteraction() {
      updateMouseRaycast();
      updateFieldLean();
      if (!userInfluence.dragging) decaySculptBias(0.987);

      if (morphJar && userInfluence.sculptDirty && !morphState && !birthState && currentForm) {
        applyProfileGeometryToJar(morphJar, profileWithUserSculpt(currentForm));
        userInfluence.sculptDirty = false;
      }
    }

    initMorphingJar();

    const canvas = renderer.domElement;
    canvas.addEventListener('mousemove', (e) => {
      updateMouseFromEvent(e);
      if (userInfluence.dragging) {
        const t = screenYToHeightT(e.clientY);
        const amount = (e.clientX - userInfluence.lastDragX) * 0.0011;
        if (Math.abs(amount) > 0.00005) sculptAtHeightT(t, amount);
        userInfluence.lastDragX = e.clientX;
        userInfluence.lastDragY = e.clientY;
      }
    });

    canvas.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      userInfluence.dragging = true;
      userInfluence.lastDragX = e.clientX;
      userInfluence.lastDragY = e.clientY;
      updateMouseFromEvent(e);
    });

    window.addEventListener('mouseup', () => {
      userInfluence.dragging = false;
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      userInfluence.scrollEnergy += e.deltaY * 0.0012;

      if (birthState) {
        birthState.startTime -= e.deltaY * 5.5;
      } else if (morphState) {
        morphState.startTime -= e.deltaY * 5.5;
      } else if (e.deltaY < 0) {
        if (morphTimer) clearTimeout(morphTimer);
        morphTimer = setTimeout(scheduleNextMorph, 140);
      } else if (morphTimer) {
        clearTimeout(morphTimer);
        morphTimer = setTimeout(scheduleNextMorph, HOLD_DURATION * 1000 + 600);
      }
    }, { passive: false });

    gsap.to(surfaceLightAnchor.position, {
      x: 0.8,
      duration: 22,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1
    });

    // ── Render Loop ───────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const perf = {
      tier: 1,
      ema: 16,
      geoInterval: 16,
      lastGeoUpdate: 0,
      morphGeoFrame: 0,
      applyTier(tier) {
        if (this.tier === tier) return;
        this.tier = tier;
        if (tier === 1) {
          this.geoInterval = 16;
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        } else if (tier === 2) {
          this.geoInterval = 32;
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
        } else {
          this.geoInterval = 48;
          renderer.setPixelRatio(1);
        }
        if (morphJar) {
          morphJar.outerUniforms.uPerfTier.value = tier;
          morphJar.innerUniforms.uPerfTier.value = tier;
        }
      },
      update(frameMs) {
        this.ema = this.ema * 0.9 + frameMs * 0.1;
        if (this.ema > 22 && this.tier < 3) this.applyTier(this.tier + 1);
        else if (this.ema < 15 && this.tier > 1) this.applyTier(this.tier - 1);
      }
    };

    function animate() {
      requestAnimationFrame(animate);
      const frameStart = performance.now();
      const elapsed = clock.getElapsedTime();
      const now = frameStart;
      updateBirthAnimation(now);
      updateMorphAnimation(now);
      updateUserInteraction();
      if (morphJar) {
        const t = elapsed * 1.15 + morphJar.timeOffset;
        morphJar.outerUniforms.uTime.value = t;
        morphJar.innerUniforms.uTime.value = t;
        morphJar.outerUniforms.uLightPos.value.copy(surfaceLight.position);
        morphJar.innerUniforms.uLightPos.value.copy(surfaceLight.position);
        if (!morphState && !birthState) {
          const breathe = 0.14 + Math.sin(elapsed * 0.72) * 0.09 + Math.sin(elapsed * 0.23) * 0.04;
          morphJar.outerUniforms.uBecoming.value = breathe;
          morphJar.innerUniforms.uBecoming.value = breathe;
        }
      }
      surfaceLight.position.copy(surfaceLightAnchor.position);
      rimLight.position.set(0, 0.5 + Math.sin(elapsed * 0.35) * 0.2, 7);
      renderer.render(scene, camera);
      perf.update(performance.now() - frameStart);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <script>
    const charMeanings = {
      '娥': {
        hanja: '娥',
        reading: '아 · 예쁠 娥',
        compose: ['女', '我'],
        composeLabel: '女(여자) + 我(나)',
        body: '여성성(女)과 자아(我)가 더해진 <span class="text-cyan-200">아름다움</span>. 완성된 형태가 아니라, 관찰하는 순간마다 새롭게 피어나는 생성의 언어입니다.'
      },
      '女': {
        hanja: '女',
        reading: '녀 · 계집 女',
        body: '여성성 → 유려함 → 곡선 → <span class="text-cyan-200">유기적 형태</span>. 흐르는 물처럼 부드럽게 이어지는 선.'
      },
      '我': {
        hanja: '我',
        reading: '아 · 나 我',
        body: '자아 → 창조 → 생산 → <span class="text-cyan-200">생성</span>. 자아는 끊임없이 새로운 경험과 생각을 생산하며, 본질은 유지됩니다.'
      },
      '永': {
        hanja: '永',
        reading: '영 · 길 永',
        body: '길게 이어지는 물 → 흐름 → 연결 → <span class="text-cyan-200">무한한 생성</span>. 형태는 매 순간 달라지며, 아름다움은 완성된 결과가 아니라 끊임없이 이어지는 과정입니다.'
      }
    };

    const panel = document.getElementById('meaning-panel');
    const content = document.getElementById('meaning-content');
    const charBtns = document.querySelectorAll('.char-btn');
    let activeChar = null;

    function renderMeaning(key) {
      const data = charMeanings[key];
      if (!data) return;

      let html = `
        <p class="text-[10px] tracking-[0.35em] uppercase text-cyan-300/80 mb-1">${data.reading}</p>
        <p class="font-serif text-3xl text-cyan-50 mb-2">${data.hanja}</p>
      `;

      if (data.compose) {
        html += `
          <div class="flex items-center gap-2 mb-3 text-sm text-cyan-100/90 font-serif">
            <span>획 분해</span>
            <span class="text-cyan-400/70">·</span>
            ${data.compose.map((part, i) => `
              ${i > 0 ? '<span class="text-cyan-400/70">+</span>' : ''}
              <button type="button" class="part-btn border border-cyan-300/30 rounded px-2 py-0.5 text-cyan-50 font-serif ${activeChar === part ? 'active' : ''}" data-char="${part}">${part}</button>
            `).join('')}
          </div>
        `;
      }

      html += `<p class="text-[13px] leading-relaxed text-cyan-100/90 font-serif">${data.body}</p>`;

      content.innerHTML = html;
      content.querySelectorAll('.part-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          showMeaning(btn.dataset.char);
        });
      });
    }

    function showMeaning(key) {
      if (activeChar === key) {
        hideMeaning();
        return;
      }
      activeChar = key;
      charBtns.forEach(btn => {
        const isRoot = btn.dataset.char === key || (key === '女' || key === '我') && btn.dataset.char === '娥';
        btn.classList.toggle('active', isRoot);
      });
      renderMeaning(key);
      panel.classList.add('visible');
    }

    function hideMeaning() {
      activeChar = null;
      charBtns.forEach(btn => btn.classList.remove('active'));
      panel.classList.remove('visible');
    }

    charBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showMeaning(btn.dataset.char);
      });
    });

    panel.addEventListener('click', (e) => e.stopPropagation());

    document.addEventListener('click', () => hideMeaning());
  </script>
</body>
