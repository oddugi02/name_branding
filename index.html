  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { gsap } from 'gsap';

    // ── Authentic Moon Jar Profile (달항아리) ─────────────────────────────
    function catmullRom(p0, p1, p2, p3, t) {
      const t2 = t * t, t3 = t2 * t;
      return 0.5 * (
        (2 * p1) +
        (-p0 + p2) * t +
        (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
        (-p0 + 3 * p1 - 3 * p2 + p3) * t3
      );
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6d2b79f5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Experimental Ceramic Profile Generator ────────────────────────────
    function buildProfileFromKeys(keys, detail = 100) {
      const points = [];
      const n = keys.length;
      for (let i = 0; i <= detail; i++) {
        const f = (i / detail) * (n - 1);
        const seg = Math.min(Math.floor(f), n - 2);
        const t = f - seg;
        const i0 = Math.max(seg - 1, 0);
        const i1 = seg;
        const i2 = seg + 1;
        const i3 = Math.min(seg + 2, n - 1);
        const r = Math.max(catmullRom(keys[i0][0], keys[i1][0], keys[i2][0], keys[i3][0], t), 0.004);
        const y = catmullRom(keys[i0][1], keys[i1][1], keys[i2][1], keys[i3][1], t);
        points.push(new THREE.Vector2(r, y));
      }
      if (points[0].x > 0.004) points.unshift(new THREE.Vector2(0, points[0].y));
      return points;
    }

    function warpProfile(points, rng, intensity = 1) {
      const rand = rng;
      const freq = 2.5 + rand() * 4;
      const phase = rand() * Math.PI * 2;
      const amp = (0.025 + rand() * 0.07) * intensity;
      return points.map((p) => {
        const w = Math.sin(p.y * freq + phase) * amp;
        const w2 = Math.sin(p.y * freq * 2.3 + phase * 1.7) * amp * 0.45;
        return new THREE.Vector2(Math.max(p.x + w + w2, 0.004), p.y);
      });
    }

    function ribbedWarp(points, rng, intensity = 1) {
      const rand = rng;
      const freq = 10 + rand() * 14;
      const phase = rand() * Math.PI * 2;
      const amp = (0.012 + rand() * 0.04) * intensity;
      return points.map((p) => {
        const w = Math.sin(p.y * freq + phase) * amp;
        const w2 = Math.sin(p.y * freq * 1.7 + phase * 2.1) * amp * 0.55;
        return new THREE.Vector2(Math.max(p.x + w + w2, 0.004), p.y);
      });
    }

    function hash1D(n, seed) {
      const x = Math.sin(n * 127.1 + seed * 311.7) * 43758.5453123;
      return x - Math.floor(x);
    }

    function smoothNoise1D(x, seed) {
      const i = Math.floor(x);
      const f = x - i;
      const u = f * f * (3 - 2 * f);
      return hash1D(i, seed) * (1 - u) + hash1D(i + 1, seed) * u;
    }

    function fbm1D(x, octaves, seed) {
      let v = 0;
      let a = 0.5;
      let f = 1;
      for (let i = 0; i < octaves; i++) {
        v += a * (smoothNoise1D(x * f, seed + i * 17.31) * 2 - 1);
        f *= 2.07;
        a *= 0.52;
      }
      return v;
    }

    function gaussianBump(t, center, width, strength) {
      return strength * Math.exp(-Math.pow((t - center) / Math.max(width, 0.02), 2));
    }

    function pinchEnvelope(t, center, width, depth) {
      return 1 - depth * gaussianBump(t, center, width, 1);
    }

    function superellipseRadius(t, p, baseR) {
      const u = Math.abs(2 * t - 1);
      return baseR * Math.pow(Math.max(1 - Math.pow(u, p), 0), 1 / p);
    }

    function inferSurfaceType(rng, meta) {
      const rand = rng;
      let weights = [1, 1, 1, 1, 1, 1, 1, 1];
      if (meta.ribbed) { weights[1] += 3; weights[4] += 2; }
      if (meta.shallow) weights[7] += 3;
      if (meta.pinchDepth > 0.35) { weights[3] += 2; weights[10 % 8] += 1; }
      if (meta.bulgeCount >= 3) weights[3] += 2;
      if (meta.harmonicEnergy > 0.45) { weights[1] += 2; weights[5] += 2; }
      if (meta.dripBias > 0.5) weights[2] += 4;
      if (meta.shellMouth) weights[7] += 3;
      if (meta.coilSteps >= 4) weights[0] += 3;
      const total = weights.reduce((a, b) => a + b, 0);
      let roll = rand() * total;
      for (let i = 0; i < weights.length; i++) {
        roll -= weights[i];
        if (roll <= 0) return i;
      }
      return 0;
    }

    function applyOrganicPasses(profile, rng, meta) {
      const rand = rng;
      let p = warpProfile(profile, rng, 0.25 + rand() * 0.35);
      p = p.map((pt, i, arr) => {
        const t = i / (arr.length - 1);
        const sag = Math.sin(t * Math.PI) * (0.004 + rand() * 0.01) * meta.slump * 0.35;
        const breathe = fbm1D(t * 2.2 + meta.formSeed * 0.002, 2, meta.formSeed + 7) * (0.004 + rand() * 0.012);
        return new THREE.Vector2(Math.max(pt.x + sag + breathe, 0.004), pt.y);
      });
      if (meta.ribbed) p = ribbedWarp(p, rng, 0.35 + rand() * 0.4);
      return smoothSculpturalProfile(p, 1);
    }

    function smoothSculpturalProfile(points, passes = 2) {
      if (passes <= 0) return points.map((pt) => pt.clone());
      let p = points.map((pt) => pt.clone());
      for (let pass = 0; pass < passes; pass++) {
        const next = [];
        for (let i = 0; i < p.length; i++) {
          if (i === 0 || i === p.length - 1) {
            next.push(p[i].clone());
            continue;
          }
          const r = (p[i - 1].x + p[i].x * 2 + p[i + 1].x) * 0.25;
          next.push(new THREE.Vector2(Math.max(r, 0.004), p[i].y));
        }
        p = next;
      }
      return p;
    }

    function capProfileSlopes(points, maxDelta) {
      let p = points.map((pt) => pt.clone());
      for (let pass = 0; pass < 4; pass++) {
        for (let i = 1; i < p.length - 1; i++) {
          const lo = Math.max(0.004, Math.min(p[i - 1].x, p[i + 1].x) - maxDelta);
          const hi = Math.max(p[i - 1].x, p[i + 1].x) + maxDelta;
          p[i].x = Math.min(hi, Math.max(lo, p[i].x));
        }
      }
      return p;
    }

    function profileBoxinessScore(profile) {
      const n = profile.length;
      if (n < 10) return 0;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      let maxFlatRun = 0;
      let run = 1;
      for (let i = 1; i < n; i++) {
        const r0 = profile[i - 1].x;
        const r1 = profile[i].x;
        const dr = Math.abs(r1 - r0) / Math.max(maxR, 0.01);
        const nearMax = Math.min(r0, r1) / Math.max(maxR, 0.01) > 0.68;
        if (dr < 0.0055 && nearMax) {
          run++;
          maxFlatRun = Math.max(maxFlatRun, run);
        } else {
          run = 1;
        }
      }

      let verticalWallPoints = 0;
      for (let i = 2; i < n - 2; i++) {
        const t = i / (n - 1);
        if (t < 0.18 || t > 0.86) continue;
        const dr = Math.abs(profile[i].x - profile[i - 1].x) / Math.max(maxR, 0.01);
        if (dr < 0.0035 && profile[i].x / maxR > 0.66) verticalWallPoints++;
      }

      let score = 0;
      const flatRatio = maxFlatRun / n;
      if (flatRatio > 0.08) score += (flatRatio - 0.08) * 10;
      score += (verticalWallPoints / n) * 5.5;
      return Math.min(1, score);
    }

    function profileShoulderCornerPenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      if (maxR < 0.01 || maxIdx < 3 || maxIdx > n - 12) return 0;

      let penalty = 0;
      const rise = (profile[maxIdx].x - profile[Math.max(0, maxIdx - 3)].x) / maxR;
      let flatAfter = 0;
      const scanEnd = Math.min(n - 1, maxIdx + Math.floor(n * 0.14));
      for (let i = maxIdx + 1; i <= scanEnd; i++) {
        if (Math.abs(profile[i].x - profile[i - 1].x) / maxR < 0.0035) flatAfter++;
      }
      if (rise > 0.07 && flatAfter >= 3) penalty += 1.4;

      let wallLen = 0;
      for (let i = maxIdx + 1; i < n - 4; i++) {
        if (Math.abs(profile[i].x - profile[maxIdx].x) / maxR < 0.028) wallLen++;
        else if (wallLen > 2) break;
      }
      if (wallLen / n > 0.07) penalty += 1.6;

      return penalty;
    }

    function profileTrapezoidBasePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      const lowStart = Math.floor(n * 0.06);
      const lowEnd = Math.floor(n * 0.2);
      let minR = Infinity;
      for (let i = lowStart; i <= lowEnd; i++) minR = Math.min(minR, profile[i].x);
      if (minR === Infinity) return 0;

      const footR = profile[0].x;
      const bodyR = profile[Math.floor(n * 0.38)].x;
      if (bodyR / maxR > 0.72 && minR / maxR < 0.52 && footR > minR * 1.12) {
        return 1.3;
      }
      return 0;
    }

    function relaxBoxyWalls(profile) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      for (let pass = 0; pass < 2; pass++) {
        for (let i = 3; i < n - 3; i++) {
          const dr = Math.abs(out[i].x - out[i - 1].x) / Math.max(maxR, 0.01);
          const rNorm = out[i].x / Math.max(maxR, 0.01);
          if (dr < 0.0035 && rNorm > 0.64) {
            const t = i / (n - 1);
            out[i].x += Math.sin(t * Math.PI * 1.15) * maxR * 0.012;
          }
        }
        capProfileSlopes(out, 0.004);
      }
      return smoothPotteryProfile(out);
    }

    function profileThinGirthScore(profile) {
      const n = profile.length;
      if (n < 10) return 0;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      const start = Math.floor(n * 0.1);
      const end = Math.floor(n * 0.9);
      let minR = Infinity;
      let thinCount = 0;
      let maxThinRun = 0;
      let run = 0;

      for (let i = start; i <= end; i++) {
        const r = profile[i].x;
        minR = Math.min(minR, r);
        const rNorm = r / Math.max(maxR, 0.01);
        if (rNorm < 0.46) {
          thinCount++;
          run++;
          maxThinRun = Math.max(maxThinRun, run);
        } else {
          run = 0;
        }
      }

      let score = 0;
      const minRatio = minR / Math.max(maxR, 0.01);
      if (minRatio < 0.5) score += (0.5 - minRatio) * 3.4;
      if (minRatio < 0.36) score += 0.32;

      const span = end - start + 1;
      const thinRatio = thinCount / span;
      if (thinRatio > 0.1) score += (thinRatio - 0.1) * 4.8;

      const runRatio = maxThinRun / n;
      if (runRatio > 0.1) score += (runRatio - 0.1) * 16;
      return Math.min(1, score);
    }

    function collapseThinRuns(profile, thinThreshold = 0.38, minRunLength = 11, targetRatio = 0.52) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);
      const targetR = maxR * targetRatio;

      const inflateRun = (runStart, runEnd) => {
        const len = runEnd - runStart;
        if (len < minRunLength) return;
        for (let j = runStart; j < runEnd; j++) {
          const t = (j - runStart) / Math.max(len - 1, 1);
          const bell = 0.84 + Math.sin(t * Math.PI) * 0.16;
          out[j].x = Math.max(out[j].x, targetR * bell);
        }
      };

      let runStart = -1;
      for (let i = 0; i < n; i++) {
        const thin = out[i].x / Math.max(maxR, 0.01) < thinThreshold;
        if (thin) {
          if (runStart < 0) runStart = i;
        } else if (runStart >= 0) {
          inflateRun(runStart, i);
          runStart = -1;
        }
      }
      if (runStart >= 0) inflateRun(runStart, n);

      return smoothSculpturalProfile(out, 1);
    }

    function profileSpikiness(profile) {
      let inflect = 0;
      for (let i = 2; i < profile.length; i++) {
        const d1 = profile[i].x - profile[i - 1].x;
        const d0 = profile[i - 1].x - profile[i - 2].x;
        inflect += Math.abs(d1 - d0);
      }
      return inflect / Math.max(profile.length - 2, 1);
    }

    function profileMaxAngularJump(profile) {
      let maxJump = 0;
      for (let i = 2; i < profile.length; i++) {
        const d1 = profile[i].x - profile[i - 1].x;
        const d0 = profile[i - 1].x - profile[i - 2].x;
        maxJump = Math.max(maxJump, Math.abs(d1 - d0));
      }
      return maxJump;
    }

    function profileCurveBeautyScore(profile) {
      const n = profile.length;
      if (n < 12) return 0;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      let inflectSignChanges = 0;
      let prevSign = 0;
      let curvatureSum = 0;
      let smoothSlopeSum = 0;
      let peaks = 0;
      let valleys = 0;

      for (let i = 2; i < n - 2; i++) {
        const d1 = profile[i].x - profile[i - 1].x;
        const d0 = profile[i - 1].x - profile[i - 2].x;
        const curv = d1 - d0;
        curvatureSum += Math.abs(curv);

        const sign = curv > 0.0008 ? 1 : curv < -0.0008 ? -1 : 0;
        if (sign !== 0 && prevSign !== 0 && sign !== prevSign) inflectSignChanges++;
        if (sign !== 0) prevSign = sign;

        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > maxR * 0.32) peaks++;
        if (r < profile[i - 1].x && r < profile[i + 1].x && r > maxR * 0.1) valleys++;

        const slope = Math.abs(d1) / Math.max(maxR, 0.01);
        if (slope > 0.002 && slope < 0.06) smoothSlopeSum++;
      }

      const curvNorm = curvatureSum / Math.max(n, 1);
      const slopeRatio = smoothSlopeSum / Math.max(n - 4, 1);

      let score = 0;
      if (curvNorm >= 0.0045 && curvNorm <= 0.042) score += 0.4;
      else score += Math.max(0, 0.3 - Math.abs(curvNorm - 0.02) * 5.5);

      if (inflectSignChanges >= 2 && inflectSignChanges <= 9) score += 0.34;
      else if (inflectSignChanges >= 1) score += 0.14;

      if (peaks >= 1 && peaks <= 4) score += 0.24;
      if (valleys >= 1 && valleys <= 5) score += 0.2;
      score += slopeRatio * 0.38;

      const jump = profileMaxAngularJump(profile);
      if (jump < 0.004) score += 0.22;
      else if (jump < 0.0065) score += 0.1;
      else score -= (jump - 0.0065) * 10;

      score -= profileBoxinessScore(profile) * 0.85;
      score -= profileShoulderCornerPenalty(profile) * 0.35;
      return Math.min(1, Math.max(0, score));
    }

    function enrichCeramicCurves(profile, rng, intensity = 0.55) {
      const rand = rng;
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const h1 = 0.85 + rand() * 1.8;
      const h2 = 1.35 + rand() * 2.4;
      const h3 = 2.1 + rand() * 2.8;
      const ph1 = rand() * Math.PI * 2;
      const ph2 = rand() * Math.PI * 2;
      const ph3 = rand() * Math.PI * 2;
      const amp = (0.014 + rand() * 0.026) * intensity * maxR;

      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        if (t < 0.035 || t > 0.965) continue;
        const bell = Math.sin(t * Math.PI);
        const wave = Math.sin(t * Math.PI * h1 + ph1) * 0.5
          + Math.sin(t * Math.PI * h2 + ph2) * 0.32
          + Math.sin(t * Math.PI * h3 + ph3) * 0.18;
        out[i].x = Math.max(out[i].x + wave * amp * bell, maxR * 0.07);
      }
      return smoothSculpturalProfile(out, 1);
    }

    function smoothPotteryProfile(profile) {
      let p = smoothSculpturalProfile(profile, 3);
      p = capProfileSlopes(p, 0.005);
      p = smoothSculpturalProfile(p, 2);
      p = capProfileSlopes(p, 0.004);
      return smoothSculpturalProfile(p, 1);
    }

    function refineProfileSilhouette(profile, isCultural) {
      let p = smoothSculpturalProfile(profile, isCultural ? 2 : 2);
      p = capProfileSlopes(p, isCultural ? 0.0085 : 0.014);
      p = smoothSculpturalProfile(p, isCultural ? 1 : 1);
      if (isCultural) {
        p = capProfileSlopes(p, 0.0065);
        p = smoothSculpturalProfile(p, 1);
      }
      return p;
    }

    function finishVesselRadius(t, r, baseR, rand, opts = {}) {
      const neckStart = opts.neckStart ?? (0.74 + rand() * 0.06);
      const mouthRatio = opts.mouthRatio ?? (0.46 + rand() * 0.2);
      const lipFlare = opts.lipFlare ?? (1.0 + rand() * 0.1);
      if (t > neckStart - 0.05) {
        const nt = (t - neckStart) / Math.max(1 - neckStart, 0.01);
        const neck = mouthRatio + (1 - mouthRatio) * Math.pow(Math.max(1 - nt, 0), 2.15);
        const lip = t > 0.965 ? lipFlare : 1.0;
        const neckR = baseR * neck * lip * 1.08;
        const blend = Math.min(1, Math.max(0, (t - (neckStart - 0.05)) / 0.09));
        const smoothBlend = blend * blend * (3 - 2 * blend);
        r = r + (Math.min(r, neckR) - r) * smoothBlend;
      }
      return Math.max(r, 0.004);
    }

    function profileCapsuleScore(profile) {
      const n = profile.length;
      if (n < 8) return 1;
      let maxR = 0;
      let waistR = Infinity;
      let mouthR = profile[n - 1].x;
      let baseR = profile[Math.min(3, n - 1)].x;
      for (let i = 0; i < n; i++) {
        const r = profile[i].x;
        maxR = Math.max(maxR, r);
        const t = i / (n - 1);
        if (t >= 0.24 && t <= 0.78) waistR = Math.min(waistR, r);
      }
      waistR = waistR === Infinity ? maxR : waistR;
      const mouthToMax = mouthR / Math.max(maxR, 0.01);
      const baseToMax = baseR / Math.max(maxR, 0.01);
      const fullness = maxR / Math.max(waistR, 0.01);

      let score = 0;
      if (mouthToMax > 0.68) score += 0.34;
      if (mouthToMax > 0.82) score += 0.28;
      if (fullness < 1.22) score += 0.34;
      if (fullness < 1.1) score += 0.24;
      if (baseToMax > 0.42 && mouthToMax > 0.62) score += 0.18;

      let symmetry = 0;
      const half = Math.floor(n / 2);
      for (let i = 0; i < half; i++) {
        symmetry += Math.abs(profile[i].x - profile[n - 1 - i].x);
      }
      if (symmetry / Math.max(maxR, 0.01) < 0.14) score += 0.22;
      return Math.min(1, score);
    }

    function profileSlendernessScore(profile) {
      const n = profile.length;
      if (n < 8) return 1;
      let maxR = 0;
      let sumR = 0;
      let peaks = 0;
      for (let i = 0; i < n; i++) {
        maxR = Math.max(maxR, profile[i].x);
        sumR += profile[i].x;
      }
      const meanR = sumR / n;
      for (let i = 2; i < n - 2; i++) {
        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > meanR * 1.12) peaks++;
      }

      let score = 0;
      if (maxR < 0.26) score += 0.42;
      else if (maxR < 0.32) score += 0.22;
      if (meanR < 0.14) score += 0.38;
      else if (meanR < 0.18) score += 0.18;
      const aspect = maxR / Math.max(CANONICAL_Y_MAX - CANONICAL_Y_MIN, 0.1);
      if (aspect < 0.42) score += 0.35;
      else if (aspect < 0.52) score += 0.15;
      if (peaks >= 3 && maxR < 0.38) score += 0.28;
      if (peaks >= 4 && maxR < 0.45) score += 0.18;
      return Math.min(1, score);
    }

    function stripProfileApex(profile) {
      const out = profile.map((p) => p.clone());
      while (out.length > 3 && out[0].x < 0.012) out.shift();
      if (out.length > 0) out[0].x = Math.max(out[0].x, 0.016);
      return out;
    }

    function normalizeCeramicFoot(profile) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      if (n < 8) return out;

      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const bodyRefIdx = Math.min(n - 1, Math.floor(n * 0.18));
      const bodyRefR = Math.max(out[bodyRefIdx].x, maxR * 0.48);
      const footRingR = Math.min(maxR * 0.24, Math.max(maxR * 0.17, bodyRefR * 0.42));
      const footEndIdx = Math.max(2, Math.floor(n * 0.035));
      const blendEnd = Math.min(n - 1, Math.floor(n * 0.095));

      out[0].x = Math.max(out[0].x, footRingR * 0.96);

      for (let i = 1; i <= footEndIdx; i++) {
        out[i].x = Math.max(out[i].x, footRingR);
      }
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const t = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const ease = t * t * (3 - 2 * t);
        const target = footRingR + (bodyRefR - footRingR) * ease;
        out[i].x = Math.max(out[i].x, target);
      }

      const spindleLimit = Math.floor(n * 0.1);
      for (let i = 0; i <= spindleLimit; i++) {
        const t = i / Math.max(spindleLimit, 1);
        const floorR = footRingR * (0.94 + t * 0.14);
        out[i].x = Math.max(out[i].x, floorR);
      }

      return smoothPotteryProfile(out);
    }

    function profileFootSpindlePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);
      let spindlePoints = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x / Math.max(maxR, 0.01) < 0.36) spindlePoints++;
        else break;
      }
      const spindleRatio = spindlePoints / Math.max(n, 1);
      let penalty = 0;
      if (spindleRatio > 0.08) penalty += (spindleRatio - 0.08) * 18;

      let maxRun = 0;
      let run = 0;
      for (let i = Math.floor(n * 0.08); i <= Math.floor(n * 0.9); i++) {
        if (profile[i].x / Math.max(maxR, 0.01) < 0.42) {
          run++;
          maxRun = Math.max(maxRun, run);
        } else {
          run = 0;
        }
      }
      if (maxRun / n > 0.1) penalty += (maxRun / n - 0.1) * 18;
      return penalty;
    }

    function applyCeramicMouth(profile, rng) {
      const rand = rng;
      const n = profile.length;
      const out = profile.map((p) => p.clone());
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const neckStartT = 0.78 + rand() * 0.05;
      const mouthRatio = 0.34 + rand() * 0.08;
      const lipFlare = 1.008 + rand() * 0.025;
      const blendStartT = Math.max(0.62, neckStartT - 0.12);

      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        if (t < blendStartT) continue;
        const nt = (t - neckStartT) / Math.max(1 - neckStartT, 0.01);
        const neckTarget = maxR * (mouthRatio + (1 - mouthRatio) * Math.pow(Math.max(1 - nt, 0), 2.4));
        const lip = t > 0.94 ? lipFlare : 1.0;
        const target = neckTarget * lip;
        const blend = Math.min(1, Math.max(0, (t - blendStartT) / Math.max(neckStartT - blendStartT, 0.01)));
        const smoothBlend = blend * blend * (3 - 2 * blend);
        out[i].x = out[i].x * (1 - smoothBlend * 0.82) + target * (smoothBlend * 0.82);
      }

      out[n - 1].x = Math.max(0.014, Math.min(out[n - 1].x, maxR * mouthRatio * lipFlare));
      return smoothPotteryProfile(out);
    }

    function applyCeramicBase(profile, rng) {
      const rand = rng;
      const out = stripProfileApex(profile).map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const footDepthT = 0.025 + rand() * 0.025;
      const footEndIdx = Math.max(2, Math.floor(footDepthT * (n - 1)));
      const blendEnd = Math.min(n - 1, footEndIdx + Math.max(4, Math.floor(n * 0.04)));
      const targetFoot = Math.max(maxR * (0.18 + rand() * 0.05), out[blendEnd].x * 0.78);

      for (let i = 0; i <= footEndIdx; i++) {
        const ft = i / Math.max(footEndIdx, 1);
        const ease = ft * ft * (3 - 2 * ft);
        const desired = targetFoot + (out[blendEnd].x - targetFoot) * ease * 0.55;
        out[i].x = out[i].x * 0.62 + desired * 0.38;
      }
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const bt = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const smooth = bt * bt * (3 - 2 * bt);
        out[i].x = out[footEndIdx].x + (out[i].x - out[footEndIdx].x) * Math.max(0.42, smooth);
      }

      return normalizeCeramicFoot(smoothSculpturalProfile(out, 1));
    }

    function syncBaseWithBody(profile) {
      const n = profile.length;
      if (n < 6) return profile;

      let maxR = 0;
      for (let i = 0; i < n; i++) maxR = Math.max(maxR, profile[i].x);

      const lowerStart = Math.max(1, Math.floor(n * 0.1));
      const lowerEnd = Math.max(lowerStart + 1, Math.floor(n * 0.2));
      let lowerPeak = 0;
      for (let i = lowerStart; i <= lowerEnd; i++) {
        lowerPeak = Math.max(lowerPeak, profile[i].x);
      }

      const footEndIdx = Math.max(2, Math.floor(0.06 * (n - 1)));
      let footPeak = 0;
      for (let i = 0; i <= footEndIdx; i++) {
        footPeak = Math.max(footPeak, profile[i].x);
      }

      const targetFoot = Math.max(maxR * 0.19, lowerPeak * 0.68, footPeak);
      if (footPeak >= targetFoot * 0.92) return normalizeCeramicFoot(profile);

      const scale = targetFoot / Math.max(footPeak, 0.004);
      for (let i = 0; i <= footEndIdx; i++) {
        profile[i].x = Math.min(maxR * 1.04, profile[i].x * scale);
      }

      const blendEnd = Math.min(n - 1, footEndIdx + Math.max(4, Math.floor(n * 0.05)));
      const fromR = profile[footEndIdx].x;
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const bt = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const smooth = bt * bt * (3 - 2 * bt);
        profile[i].x = fromR + (profile[i].x - fromR) * Math.max(0.45, smooth);
      }
      return normalizeCeramicFoot(profile);
    }

    function softenWaistPinch(profile, minWaistRatio = 0.76) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);
      const midStart = Math.floor(n * 0.22);
      const midEnd = Math.floor(n * 0.78);
      let waistR = Infinity;
      for (let i = midStart; i <= midEnd; i++) waistR = Math.min(waistR, out[i].x);
      if (waistR >= maxR * minWaistRatio) return collapseThinRuns(out);
      const targetWaist = maxR * minWaistRatio;
      for (let i = midStart; i <= midEnd; i++) {
        out[i].x = Math.max(out[i].x, targetWaist);
      }
      return collapseThinRuns(smoothSculpturalProfile(out, 1));
    }

    function ensureCeramicSilhouette(profile, rng, isCultural = false) {
      let p = applyCeramicMouth(profile, rng);
      p = applyCeramicBase(p, rng);
      p = syncBaseWithBody(p);
      p = refineProfileSilhouette(p, isCultural);
      p = softenWaistPinch(p, isCultural ? 0.74 : 0.72);
      if (profileCapsuleScore(p) > MAX_CAPSULE_SCORE || profileSlendernessScore(p) > MAX_SLENDERNESS_SCORE) {
        p = applyCeramicMouth(refineProfileSilhouette(profile, true), rng);
        p = applyCeramicBase(p, rng);
        p = syncBaseWithBody(p);
        p = softenWaistPinch(p, isCultural ? 0.74 : 0.72);
      }
      if (isCultural) p = enrichCeramicCurves(p, rng, 0.74);
      if (isCultural) p = collapseThinRuns(p);
      if (isCultural) p = relaxBoxyWalls(p);
      if (isCultural) p = smoothPotteryProfile(p);
      return p;
    }

    function isSculpturalPotteryType(formType) {
      if (!formType) return false;
      if (formType === '__SCULPTURAL__') return true;
      if (SCULPTURAL_ROUND_ARCHETYPES.includes(formType)) return true;
      if (String(formType).startsWith('Hybrid:')) {
        return String(formType).replace('Hybrid:', '').split('/')
          .some((id) => SCULPTURAL_ROUND_ARCHETYPES.includes(id));
      }
      return false;
    }

    function resolveMorphArchetypeId(forcedArchetypeId, rand) {
      if (forcedArchetypeId === '__SCULPTURAL__') {
        return SCULPTURAL_ROUND_ARCHETYPES[Math.floor(rand() * SCULPTURAL_ROUND_ARCHETYPES.length)];
      }
      return forcedArchetypeId;
    }

    function profilePeakCenter(profile) {
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 1; i < profile.length - 1; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      return maxIdx / Math.max(profile.length - 1, 1);
    }

    function profileWaistFullness(profile) {
      const n = profile.length;
      let maxR = 0;
      let waistR = Infinity;
      for (let i = 0; i < n; i++) maxR = Math.max(maxR, profile[i].x);
      for (let i = Math.floor(n * 0.28); i <= Math.floor(n * 0.72); i++) {
        waistR = Math.min(waistR, profile[i].x);
      }
      if (waistR === Infinity) waistR = maxR;
      return { maxR, waistR, fullness: maxR / Math.max(waistR, 0.01) };
    }

    function profileMoonJarScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const bellyCenter = profilePeakCenter(profile);
      let peaks = 0;
      for (let i = 2; i < n - 2; i++) {
        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > maxR * 0.7) peaks++;
      }
      const spiky = profileSpikiness(profile);

      let score = 0;
      if (peaks <= 1) score += 0.34;
      if (bellyCenter >= 0.42 && bellyCenter <= 0.56) score += 0.32;
      if (fullness >= 1.02 && fullness <= 1.12) score += 0.34;
      score += profileCapsuleScore(profile) * 0.22;
      score += Math.max(0, 0.24 - spiky * 5.5);
      return Math.min(1, score);
    }

    function profileMaebyeongScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const shoulderCenter = profilePeakCenter(profile);
      const mouthR = profile[n - 1].x;
      const mouthRatio = mouthR / Math.max(maxR, 0.01);
      const baseR = profile[Math.floor(n * 0.04)].x;
      const baseRatio = baseR / Math.max(maxR, 0.01);

      let score = 0;
      if (shoulderCenter >= 0.62 && shoulderCenter <= 0.86) score += 0.38;
      if (fullness >= 1.35 && fullness <= 3.2) score += 0.38;
      if (mouthRatio >= 0.22 && mouthRatio <= 0.48) score += 0.18;
      if (baseRatio >= 0.14 && baseRatio <= 0.42) score += 0.16;
      score += Math.max(0, 0.22 - profileSpikiness(profile) * 5.2);
      return Math.min(1, score);
    }

    function profileBaekjaScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const shoulderCenter = profilePeakCenter(profile);
      const mouthR = profile[n - 1].x;
      const mouthRatio = mouthR / Math.max(maxR, 0.01);
      const baseR = profile[Math.floor(n * 0.05)].x;
      const baseRatio = baseR / Math.max(maxR, 0.01);

      let score = 0;
      if (shoulderCenter >= 0.5 && shoulderCenter <= 0.7) score += 0.32;
      if (fullness >= 1.08 && fullness <= 1.65) score += 0.32;
      if (mouthRatio >= 0.28 && mouthRatio <= 0.52) score += 0.18;
      if (baseRatio >= 0.22 && baseRatio <= 0.52) score += 0.16;
      score += profileCapsuleScore(profile) * 0.12;
      score += Math.max(0, 0.2 - profileSpikiness(profile) * 4.8);
      return Math.min(1, score);
    }

    function profileSculpturalScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      let peaks = 0;
      for (let i = 2; i < n - 2; i++) {
        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > maxR * 0.52) peaks++;
      }
      const curveBeauty = profileCurveBeautyScore(profile);
      let score = curveBeauty * 0.52;
      if (peaks >= 2 && peaks <= 4) score += 0.34;
      else if (peaks === 1) score += 0.16;
      if (fullness >= 1.12 && fullness <= 3.8) score += 0.22;
      score += Math.max(0, 0.18 - profileSpikiness(profile) * 4.2);
      score -= profileBoxinessScore(profile) * 0.35;
      return Math.min(1, Math.max(0, score));
    }

    function culturalProfileScore(data) {
      const type = data.formType;
      if (isSculpturalPotteryType(type)) {
        return Math.min(1, profileSculpturalScore(data.profile) * 0.78
          + profileCurveBeautyScore(data.profile) * 0.22);
      }
      let score = 0;
      if (type === 'Maebyeong') score = profileMaebyeongScore(data.profile);
      else if (type === 'WhitePorcelain') score = profileBaekjaScore(data.profile);
      else if (type === 'MoonJar') score = profileMoonJarScore(data.profile);
      else if (type.startsWith('Hybrid:')) {
        score = profileSculpturalScore(data.profile) * 0.42
          + profileMoonJarScore(data.profile) * 0.18
          + profileCurveBeautyScore(data.profile) * 0.4;
      } else score = profileMoonJarScore(data.profile) * 0.35;
      score = score * 0.72 + profileCurveBeautyScore(data.profile) * 0.28;
      return Math.min(1, score);
    }

    function moonJarRadius(t, baseR, rand, formSeed) {
      const belly = 0.495 + rand() * 0.018;
      const bellyWidth = 0.24 + rand() * 0.018;
      let r = baseR * (0.3 + 0.7 * Math.exp(-Math.pow((t - belly) / bellyWidth, 2)));
      const distFromBelly = Math.abs(t - belly);
      r *= 1 - Math.pow(distFromBelly / 0.52, 2.0) * 0.055;
      if (t < 0.1) {
        const ft = t / 0.1;
        r *= 0.9 + 0.1 * Math.sin(ft * Math.PI * 0.5);
      }
      if (t > 0.8) {
        const nt = (t - 0.8) / 0.2;
        r *= 1 - nt * nt * (0.48 + rand() * 0.05);
      }
      return finishVesselRadius(t, r, baseR, rand, {
        neckStart: 0.84 + rand() * 0.02,
        mouthRatio: 0.34 + rand() * 0.06,
        lipFlare: 1.008 + rand() * 0.018
      });
    }

    function classicMoonJarRadius(t, baseR, rand, formSeed) {
      const belly = 0.498;
      const bellyWidth = 0.238;
      let r = baseR * (0.32 + 0.68 * Math.exp(-Math.pow((t - belly) / bellyWidth, 2)));
      const distFromBelly = Math.abs(t - belly);
      r *= 1 - Math.pow(distFromBelly / 0.52, 2.0) * 0.05;
      if (t < 0.1) {
        const ft = t / 0.1;
        r *= 0.91 + 0.09 * Math.sin(ft * Math.PI * 0.5);
      }
      if (t > 0.805) {
        const nt = (t - 0.805) / 0.195;
        r *= 1 - nt * nt * 0.5;
      }
      return finishVesselRadius(t, r, baseR, rand, {
        neckStart: 0.842,
        mouthRatio: 0.36,
        lipFlare: 1.01
      });
    }

    function maebyeongRadius(t, baseR, rand, formSeed) {
      const shoulder = 0.76 + rand() * 0.035;

    const RADIUS_BY_ARCHETYPE = {

      AmphoraCeramic: amphoraCeramicRadius,

      SlumpFlow: slumpFlowRadius,
