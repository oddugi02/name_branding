  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { gsap } from 'gsap';

    // ── Authentic Moon Jar Profile (달항아리) ─────────────────────────────
    function catmullRom(p0, p1, p2, p3, t) {
      const t2 = t * t, t3 = t2 * t;
      return 0.5 * (
        (2 * p1) +
        (-p0 + p2) * t +
        (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
        (-p0 + 3 * p1 - 3 * p2 + p3) * t3
      );
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = (seed + 0x6d2b79f5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Experimental Ceramic Profile Generator ────────────────────────────
    function buildProfileFromKeys(keys, detail = 100) {
      const points = [];
      const n = keys.length;
      for (let i = 0; i <= detail; i++) {
        const f = (i / detail) * (n - 1);
        const seg = Math.min(Math.floor(f), n - 2);
        const t = f - seg;
        const i0 = Math.max(seg - 1, 0);
        const i1 = seg;
        const i2 = seg + 1;
        const i3 = Math.min(seg + 2, n - 1);
        const r = Math.max(catmullRom(keys[i0][0], keys[i1][0], keys[i2][0], keys[i3][0], t), 0.004);
        const y = catmullRom(keys[i0][1], keys[i1][1], keys[i2][1], keys[i3][1], t);
        points.push(new THREE.Vector2(r, y));
      }
      if (points[0].x > 0.004) points.unshift(new THREE.Vector2(0, points[0].y));
      return points;
    }

    function warpProfile(points, rng, intensity = 1) {
      const rand = rng;
      const freq = 2.5 + rand() * 4;
      const phase = rand() * Math.PI * 2;
      const amp = (0.025 + rand() * 0.07) * intensity;
      return points.map((p) => {
        const w = Math.sin(p.y * freq + phase) * amp;
        const w2 = Math.sin(p.y * freq * 2.3 + phase * 1.7) * amp * 0.45;
        return new THREE.Vector2(Math.max(p.x + w + w2, 0.004), p.y);
      });
    }

    function ribbedWarp(points, rng, intensity = 1) {
      const rand = rng;
      const freq = 10 + rand() * 14;
      const phase = rand() * Math.PI * 2;
      const amp = (0.012 + rand() * 0.04) * intensity;
      return points.map((p) => {
        const w = Math.sin(p.y * freq + phase) * amp;
        const w2 = Math.sin(p.y * freq * 1.7 + phase * 2.1) * amp * 0.55;
        return new THREE.Vector2(Math.max(p.x + w + w2, 0.004), p.y);
      });
    }

    function hash1D(n, seed) {
      const x = Math.sin(n * 127.1 + seed * 311.7) * 43758.5453123;
      return x - Math.floor(x);
    }

    function smoothNoise1D(x, seed) {
      const i = Math.floor(x);
      const f = x - i;
      const u = f * f * (3 - 2 * f);
      return hash1D(i, seed) * (1 - u) + hash1D(i + 1, seed) * u;
    }

    function fbm1D(x, octaves, seed) {
      let v = 0;
      let a = 0.5;
      let f = 1;
      for (let i = 0; i < octaves; i++) {
        v += a * (smoothNoise1D(x * f, seed + i * 17.31) * 2 - 1);
        f *= 2.07;
        a *= 0.52;
      }
      return v;
    }

    function gaussianBump(t, center, width, strength) {
      return strength * Math.exp(-Math.pow((t - center) / Math.max(width, 0.02), 2));
    }

    function pinchEnvelope(t, center, width, depth) {
      return 1 - depth * gaussianBump(t, center, width, 1);
    }

    function superellipseRadius(t, p, baseR) {
      const u = Math.abs(2 * t - 1);
      return baseR * Math.pow(Math.max(1 - Math.pow(u, p), 0), 1 / p);
    }

    function inferSurfaceType(rng, meta) {
      const rand = rng;
      let weights = [1, 1, 1, 1, 1, 1, 1, 1];
      if (meta.ribbed) { weights[1] += 3; weights[4] += 2; }
      if (meta.shallow) weights[7] += 3;
      if (meta.pinchDepth > 0.35) { weights[3] += 2; weights[10 % 8] += 1; }
      if (meta.bulgeCount >= 3) weights[3] += 2;
      if (meta.harmonicEnergy > 0.45) { weights[1] += 2; weights[5] += 2; }
      if (meta.dripBias > 0.5) weights[2] += 4;
      if (meta.shellMouth) weights[7] += 3;
      if (meta.coilSteps >= 4) weights[0] += 3;
      const total = weights.reduce((a, b) => a + b, 0);
      let roll = rand() * total;
      for (let i = 0; i < weights.length; i++) {
        roll -= weights[i];
        if (roll <= 0) return i;
      }
      return 0;
    }

    function applyOrganicPasses(profile, rng, meta) {
      const rand = rng;
      let p = warpProfile(profile, rng, 0.25 + rand() * 0.35);
      p = p.map((pt, i, arr) => {
        const t = i / (arr.length - 1);
        const sag = Math.sin(t * Math.PI) * (0.004 + rand() * 0.01) * meta.slump * 0.35;
        const breathe = fbm1D(t * 2.2 + meta.formSeed * 0.002, 2, meta.formSeed + 7) * (0.004 + rand() * 0.012);
        return new THREE.Vector2(Math.max(pt.x + sag + breathe, 0.004), pt.y);
      });
      if (meta.ribbed) p = ribbedWarp(p, rng, 0.35 + rand() * 0.4);
      return smoothSculpturalProfile(p, 1);
    }

    function smoothSculpturalProfile(points, passes = 2) {
      if (passes <= 0) return points.map((pt) => pt.clone());
      let p = points.map((pt) => pt.clone());
      for (let pass = 0; pass < passes; pass++) {
        const next = [];
        for (let i = 0; i < p.length; i++) {
          if (i === 0 || i === p.length - 1) {
            next.push(p[i].clone());
            continue;
          }
          const r = (p[i - 1].x + p[i].x * 2 + p[i + 1].x) * 0.25;
          next.push(new THREE.Vector2(Math.max(r, 0.004), p[i].y));
        }
        p = next;
      }
      return p;
    }

    function capProfileSlopes(points, maxDelta) {
      let p = points.map((pt) => pt.clone());
      for (let pass = 0; pass < 4; pass++) {
        for (let i = 1; i < p.length - 1; i++) {
          const lo = Math.max(0.004, Math.min(p[i - 1].x, p[i + 1].x) - maxDelta);
          const hi = Math.max(p[i - 1].x, p[i + 1].x) + maxDelta;
          p[i].x = Math.min(hi, Math.max(lo, p[i].x));
        }
      }
      return p;
    }

    function profileBoxinessScore(profile) {
      const n = profile.length;
      if (n < 10) return 0;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      let maxFlatRun = 0;
      let run = 1;
      for (let i = 1; i < n; i++) {
        const r0 = profile[i - 1].x;
        const r1 = profile[i].x;
        const dr = Math.abs(r1 - r0) / Math.max(maxR, 0.01);
        const nearMax = Math.min(r0, r1) / Math.max(maxR, 0.01) > 0.68;
        if (dr < 0.0055 && nearMax) {
          run++;
          maxFlatRun = Math.max(maxFlatRun, run);
        } else {
          run = 1;
        }
      }

      let verticalWallPoints = 0;
      for (let i = 2; i < n - 2; i++) {
        const t = i / (n - 1);
        if (t < 0.18 || t > 0.86) continue;
        const dr = Math.abs(profile[i].x - profile[i - 1].x) / Math.max(maxR, 0.01);
        if (dr < 0.0035 && profile[i].x / maxR > 0.66) verticalWallPoints++;
      }

      let score = 0;
      const flatRatio = maxFlatRun / n;
      if (flatRatio > 0.08) score += (flatRatio - 0.08) * 10;
      score += (verticalWallPoints / n) * 5.5;
      return Math.min(1, score);
    }

    function profileShoulderCornerPenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      if (maxR < 0.01 || maxIdx < 3 || maxIdx > n - 12) return 0;

      let penalty = 0;
      const rise = (profile[maxIdx].x - profile[Math.max(0, maxIdx - 3)].x) / maxR;
      let flatAfter = 0;
      const scanEnd = Math.min(n - 1, maxIdx + Math.floor(n * 0.14));
      for (let i = maxIdx + 1; i <= scanEnd; i++) {
        if (Math.abs(profile[i].x - profile[i - 1].x) / maxR < 0.0035) flatAfter++;
      }
      if (rise > 0.07 && flatAfter >= 3) penalty += 1.4;

      let wallLen = 0;
      for (let i = maxIdx + 1; i < n - 4; i++) {
        if (Math.abs(profile[i].x - profile[maxIdx].x) / maxR < 0.028) wallLen++;
        else if (wallLen > 2) break;
      }
      if (wallLen / n > 0.07) penalty += 1.6;

      return penalty;
    }

    function profileTrapezoidBasePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);

      const lowStart = Math.floor(n * 0.06);
      const lowEnd = Math.floor(n * 0.2);
      let minR = Infinity;
      for (let i = lowStart; i <= lowEnd; i++) minR = Math.min(minR, profile[i].x);
      if (minR === Infinity) return 0;

      const footR = profile[0].x;
      const bodyR = profile[Math.floor(n * 0.38)].x;
      if (bodyR / maxR > 0.72 && minR / maxR < 0.52 && footR > minR * 1.12) {
        return 1.3;
      }
      return 0;
    }

    function relaxBoxyWalls(profile) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      for (let pass = 0; pass < 2; pass++) {
        for (let i = 3; i < n - 3; i++) {
          const dr = Math.abs(out[i].x - out[i - 1].x) / Math.max(maxR, 0.01);
          const rNorm = out[i].x / Math.max(maxR, 0.01);
          if (dr < 0.0035 && rNorm > 0.64) {
            const t = i / (n - 1);
            out[i].x += Math.sin(t * Math.PI * 1.15) * maxR * 0.012;
          }
        }
        capProfileSlopes(out, 0.004);
      }
      return smoothPotteryProfile(out);
    }

    function profileSpikiness(profile) {
      let inflect = 0;
      for (let i = 2; i < profile.length; i++) {
        const d1 = profile[i].x - profile[i - 1].x;
        const d0 = profile[i - 1].x - profile[i - 2].x;
        inflect += Math.abs(d1 - d0);
      }
      return inflect / Math.max(profile.length - 2, 1);
    }

    function profileMaxAngularJump(profile) {
      let maxJump = 0;
      for (let i = 2; i < profile.length; i++) {
        const d1 = profile[i].x - profile[i - 1].x;
        const d0 = profile[i - 1].x - profile[i - 2].x;
        maxJump = Math.max(maxJump, Math.abs(d1 - d0));
      }
      return maxJump;
    }

    function smoothPotteryProfile(profile) {
      let p = smoothSculpturalProfile(profile, 3);
      p = capProfileSlopes(p, 0.005);
      p = smoothSculpturalProfile(p, 2);
      p = capProfileSlopes(p, 0.004);
      return smoothSculpturalProfile(p, 1);
    }

    function refineProfileSilhouette(profile, isCultural) {
      let p = smoothSculpturalProfile(profile, isCultural ? 3 : 2);
      p = capProfileSlopes(p, isCultural ? 0.006 : 0.014);
      p = smoothSculpturalProfile(p, isCultural ? 2 : 1);
      if (isCultural) p = smoothPotteryProfile(p);
      return p;
    }

    function finishVesselRadius(t, r, baseR, rand, opts = {}) {
      const neckStart = opts.neckStart ?? (0.74 + rand() * 0.06);
      const mouthRatio = opts.mouthRatio ?? (0.46 + rand() * 0.2);
      const lipFlare = opts.lipFlare ?? (1.0 + rand() * 0.1);
      if (t > neckStart - 0.05) {
        const nt = (t - neckStart) / Math.max(1 - neckStart, 0.01);
        const neck = mouthRatio + (1 - mouthRatio) * Math.pow(Math.max(1 - nt, 0), 2.15);
        const lip = t > 0.965 ? lipFlare : 1.0;
        const neckR = baseR * neck * lip * 1.08;
        const blend = Math.min(1, Math.max(0, (t - (neckStart - 0.05)) / 0.09));
        const smoothBlend = blend * blend * (3 - 2 * blend);
        r = r + (Math.min(r, neckR) - r) * smoothBlend;
      }
      return Math.max(r, 0.004);
    }

    function profileCapsuleScore(profile) {
      const n = profile.length;
      if (n < 8) return 1;
      let maxR = 0;
      let waistR = Infinity;
      let mouthR = profile[n - 1].x;
      let baseR = profile[Math.min(3, n - 1)].x;
      for (let i = 0; i < n; i++) {
        const r = profile[i].x;
        maxR = Math.max(maxR, r);
        const t = i / (n - 1);
        if (t >= 0.24 && t <= 0.78) waistR = Math.min(waistR, r);
      }
      waistR = waistR === Infinity ? maxR : waistR;
      const mouthToMax = mouthR / Math.max(maxR, 0.01);
      const baseToMax = baseR / Math.max(maxR, 0.01);
      const fullness = maxR / Math.max(waistR, 0.01);

      let score = 0;
      if (mouthToMax > 0.68) score += 0.34;
      if (mouthToMax > 0.82) score += 0.28;
      if (fullness < 1.22) score += 0.34;
      if (fullness < 1.1) score += 0.24;
      if (baseToMax > 0.42 && mouthToMax > 0.62) score += 0.18;

      let symmetry = 0;
      const half = Math.floor(n / 2);
      for (let i = 0; i < half; i++) {
        symmetry += Math.abs(profile[i].x - profile[n - 1 - i].x);
      }
      if (symmetry / Math.max(maxR, 0.01) < 0.14) score += 0.22;
      return Math.min(1, score);
    }

    function profileSlendernessScore(profile) {
      const n = profile.length;
      if (n < 8) return 1;
      let maxR = 0;
      let sumR = 0;
      let peaks = 0;
      for (let i = 0; i < n; i++) {
        maxR = Math.max(maxR, profile[i].x);
        sumR += profile[i].x;
      }
      const meanR = sumR / n;
      for (let i = 2; i < n - 2; i++) {
        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > meanR * 1.12) peaks++;
      }

      let score = 0;
      if (maxR < 0.26) score += 0.42;
      else if (maxR < 0.32) score += 0.22;
      if (meanR < 0.14) score += 0.38;
      else if (meanR < 0.18) score += 0.18;
      const aspect = maxR / Math.max(CANONICAL_Y_MAX - CANONICAL_Y_MIN, 0.1);
      if (aspect < 0.42) score += 0.35;
      else if (aspect < 0.52) score += 0.15;
      if (peaks >= 3 && maxR < 0.38) score += 0.28;
      if (peaks >= 4 && maxR < 0.45) score += 0.18;
      return Math.min(1, score);
    }

    function stripProfileApex(profile) {
      const out = profile.map((p) => p.clone());
      while (out.length > 3 && out[0].x < 0.012) out.shift();
      if (out.length > 0) out[0].x = Math.max(out[0].x, 0.016);
      return out;
    }

    function normalizeCeramicFoot(profile) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      if (n < 8) return out;

      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const bodyRefIdx = Math.min(n - 1, Math.floor(n * 0.18));
      const bodyRefR = Math.max(out[bodyRefIdx].x, maxR * 0.48);
      const footRingR = Math.min(maxR * 0.24, Math.max(maxR * 0.17, bodyRefR * 0.42));
      const footEndIdx = Math.max(2, Math.floor(n * 0.035));
      const blendEnd = Math.min(n - 1, Math.floor(n * 0.095));

      out[0].x = Math.max(out[0].x, footRingR * 0.96);

      for (let i = 1; i <= footEndIdx; i++) {
        out[i].x = Math.max(out[i].x, footRingR);
      }
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const t = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const ease = t * t * (3 - 2 * t);
        const target = footRingR + (bodyRefR - footRingR) * ease;
        out[i].x = Math.max(out[i].x, target);
      }

      const spindleLimit = Math.floor(n * 0.1);
      for (let i = 0; i <= spindleLimit; i++) {
        const t = i / Math.max(spindleLimit, 1);
        const floorR = footRingR * (0.94 + t * 0.14);
        out[i].x = Math.max(out[i].x, floorR);
      }

      return smoothPotteryProfile(out);
    }

    function profileFootSpindlePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      for (const p of profile) maxR = Math.max(maxR, p.x);
      let spindlePoints = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x / Math.max(maxR, 0.01) < 0.36) spindlePoints++;
        else break;
      }
      const spindleRatio = spindlePoints / Math.max(n, 1);
      if (spindleRatio <= 0.08) return 0;
      return (spindleRatio - 0.08) * 18;
    }

    function applyCeramicMouth(profile, rng) {
      const rand = rng;
      const n = profile.length;
      const out = profile.map((p) => p.clone());
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const neckStartT = 0.78 + rand() * 0.05;
      const mouthRatio = 0.34 + rand() * 0.08;
      const lipFlare = 1.008 + rand() * 0.025;
      const blendStartT = Math.max(0.62, neckStartT - 0.12);

      for (let i = 0; i < n; i++) {
        const t = i / (n - 1);
        if (t < blendStartT) continue;
        const nt = (t - neckStartT) / Math.max(1 - neckStartT, 0.01);
        const neckTarget = maxR * (mouthRatio + (1 - mouthRatio) * Math.pow(Math.max(1 - nt, 0), 2.4));
        const lip = t > 0.94 ? lipFlare : 1.0;
        const target = neckTarget * lip;
        const blend = Math.min(1, Math.max(0, (t - blendStartT) / Math.max(neckStartT - blendStartT, 0.01)));
        const smoothBlend = blend * blend * (3 - 2 * blend);
        out[i].x = out[i].x * (1 - smoothBlend * 0.82) + target * (smoothBlend * 0.82);
      }

      out[n - 1].x = Math.max(0.014, Math.min(out[n - 1].x, maxR * mouthRatio * lipFlare));
      return smoothPotteryProfile(out);
    }

    function applyCeramicBase(profile, rng) {
      const rand = rng;
      const out = stripProfileApex(profile).map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);

      const footDepthT = 0.025 + rand() * 0.025;
      const footEndIdx = Math.max(2, Math.floor(footDepthT * (n - 1)));
      const blendEnd = Math.min(n - 1, footEndIdx + Math.max(4, Math.floor(n * 0.04)));
      const targetFoot = Math.max(maxR * (0.18 + rand() * 0.05), out[blendEnd].x * 0.78);

      for (let i = 0; i <= footEndIdx; i++) {
        const ft = i / Math.max(footEndIdx, 1);
        const ease = ft * ft * (3 - 2 * ft);
        const desired = targetFoot + (out[blendEnd].x - targetFoot) * ease * 0.55;
        out[i].x = out[i].x * 0.62 + desired * 0.38;
      }
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const bt = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const smooth = bt * bt * (3 - 2 * bt);
        out[i].x = out[footEndIdx].x + (out[i].x - out[footEndIdx].x) * Math.max(0.42, smooth);
      }

      return normalizeCeramicFoot(smoothSculpturalProfile(out, 1));
    }

    function syncBaseWithBody(profile) {
      const n = profile.length;
      if (n < 6) return profile;

      let maxR = 0;
      for (let i = 0; i < n; i++) maxR = Math.max(maxR, profile[i].x);

      const lowerStart = Math.max(1, Math.floor(n * 0.1));
      const lowerEnd = Math.max(lowerStart + 1, Math.floor(n * 0.2));
      let lowerPeak = 0;
      for (let i = lowerStart; i <= lowerEnd; i++) {
        lowerPeak = Math.max(lowerPeak, profile[i].x);
      }

      const footEndIdx = Math.max(2, Math.floor(0.06 * (n - 1)));
      let footPeak = 0;
      for (let i = 0; i <= footEndIdx; i++) {
        footPeak = Math.max(footPeak, profile[i].x);
      }

      const targetFoot = Math.max(maxR * 0.19, lowerPeak * 0.68, footPeak);
      if (footPeak >= targetFoot * 0.92) return normalizeCeramicFoot(profile);

      const scale = targetFoot / Math.max(footPeak, 0.004);
      for (let i = 0; i <= footEndIdx; i++) {
        profile[i].x = Math.min(maxR * 1.04, profile[i].x * scale);
      }

      const blendEnd = Math.min(n - 1, footEndIdx + Math.max(4, Math.floor(n * 0.05)));
      const fromR = profile[footEndIdx].x;
      for (let i = footEndIdx + 1; i <= blendEnd; i++) {
        const bt = (i - footEndIdx) / Math.max(blendEnd - footEndIdx, 1);
        const smooth = bt * bt * (3 - 2 * bt);
        profile[i].x = fromR + (profile[i].x - fromR) * Math.max(0.45, smooth);
      }
      return normalizeCeramicFoot(profile);
    }

    function softenWaistPinch(profile, minWaistRatio = 0.76) {
      const out = profile.map((p) => p.clone());
      const n = out.length;
      let maxR = 0;
      for (const p of out) maxR = Math.max(maxR, p.x);
      const midStart = Math.floor(n * 0.26);
      const midEnd = Math.floor(n * 0.74);
      let waistR = Infinity;
      for (let i = midStart; i <= midEnd; i++) waistR = Math.min(waistR, out[i].x);
      if (waistR >= maxR * minWaistRatio) return out;
      const targetWaist = maxR * minWaistRatio;
      for (let i = midStart; i <= midEnd; i++) {
        out[i].x = Math.max(out[i].x, targetWaist);
      }
      return smoothSculpturalProfile(out, 1);
    }

    function ensureCeramicSilhouette(profile, rng, isCultural = false) {
      let p = applyCeramicMouth(profile, rng);
      p = applyCeramicBase(p, rng);
      p = syncBaseWithBody(p);
      p = refineProfileSilhouette(p, isCultural);
      p = softenWaistPinch(p, isCultural ? 0.82 : 0.76);
      if (profileCapsuleScore(p) > MAX_CAPSULE_SCORE || profileSlendernessScore(p) > MAX_SLENDERNESS_SCORE) {
        p = applyCeramicMouth(refineProfileSilhouette(profile, true), rng);
        p = applyCeramicBase(p, rng);
        p = syncBaseWithBody(p);
      }
      if (isCultural) p = relaxBoxyWalls(p);
      if (isCultural) p = smoothPotteryProfile(p);
      return p;
    }

    function profilePeakCenter(profile) {
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 1; i < profile.length - 1; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      return maxIdx / Math.max(profile.length - 1, 1);
    }

    function profileWaistFullness(profile) {
      const n = profile.length;
      let maxR = 0;
      let waistR = Infinity;
      for (let i = 0; i < n; i++) maxR = Math.max(maxR, profile[i].x);
      for (let i = Math.floor(n * 0.28); i <= Math.floor(n * 0.72); i++) {
        waistR = Math.min(waistR, profile[i].x);
      }
      if (waistR === Infinity) waistR = maxR;
      return { maxR, waistR, fullness: maxR / Math.max(waistR, 0.01) };
    }

    function profileMoonJarScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const bellyCenter = profilePeakCenter(profile);
      let peaks = 0;
      for (let i = 2; i < n - 2; i++) {
        const r = profile[i].x;
        if (r > profile[i - 1].x && r > profile[i + 1].x && r > maxR * 0.7) peaks++;
      }
      const spiky = profileSpikiness(profile);

      let score = 0;
      if (peaks <= 1) score += 0.34;
      if (bellyCenter >= 0.42 && bellyCenter <= 0.56) score += 0.32;
      if (fullness >= 1.02 && fullness <= 1.12) score += 0.34;
      score += profileCapsuleScore(profile) * 0.22;
      score += Math.max(0, 0.24 - spiky * 5.5);
      return Math.min(1, score);
    }

    function profileMaebyeongScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const shoulderCenter = profilePeakCenter(profile);
      const mouthR = profile[n - 1].x;
      const mouthRatio = mouthR / Math.max(maxR, 0.01);
      const baseR = profile[Math.floor(n * 0.04)].x;
      const baseRatio = baseR / Math.max(maxR, 0.01);

      let score = 0;
      if (shoulderCenter >= 0.62 && shoulderCenter <= 0.86) score += 0.38;
      if (fullness >= 1.35 && fullness <= 2.6) score += 0.34;
      if (mouthRatio >= 0.22 && mouthRatio <= 0.48) score += 0.18;
      if (baseRatio >= 0.14 && baseRatio <= 0.42) score += 0.16;
      score += Math.max(0, 0.22 - profileSpikiness(profile) * 5.2);
      return Math.min(1, score);
    }

    function profileBaekjaScore(profile) {
      const n = profile.length;
      if (n < 8) return 0;
      const { maxR, fullness } = profileWaistFullness(profile);
      const shoulderCenter = profilePeakCenter(profile);
      const mouthR = profile[n - 1].x;
      const mouthRatio = mouthR / Math.max(maxR, 0.01);
      const baseR = profile[Math.floor(n * 0.05)].x;
      const baseRatio = baseR / Math.max(maxR, 0.01);

      let score = 0;
      if (shoulderCenter >= 0.5 && shoulderCenter <= 0.7) score += 0.32;
      if (fullness >= 1.12 && fullness <= 1.55) score += 0.28;
      if (mouthRatio >= 0.28 && mouthRatio <= 0.52) score += 0.18;
      if (baseRatio >= 0.22 && baseRatio <= 0.52) score += 0.16;
      score += profileCapsuleScore(profile) * 0.12;
      score += Math.max(0, 0.2 - profileSpikiness(profile) * 4.8);
      return Math.min(1, score);
    }

    function culturalProfileScore(data) {
      const type = data.formType;
      if (type === 'Maebyeong') return profileMaebyeongScore(data.profile);
      if (type === 'WhitePorcelain') return profileBaekjaScore(data.profile);
      if (type === 'MoonJar') return profileMoonJarScore(data.profile);
      return profileMoonJarScore(data.profile) * 0.35;

    function fluidVesselRadius(t, baseR, rand, formSeed) {

      const lean = (rand() - 0.5) * 0.22 * intensity;
      const swellShift = (rand() - 0.5) * 0.18 * intensity;
      return profile.map((p, i, arr) => {
        const t = i / Math.max(arr.length - 1, 1);
        const warp = 1 + warpAmp * Math.sin(t * Math.PI * warpFreq + warpPhase);
        const swell = 1 + swellShift * Math.sin(t * Math.PI * (0.8 + rand() * 1.4) + warpPhase * 0.5);
        const stretch = radial * warp * swell;
        const leanBias = 1 + (t - 0.5) * lean;
        const baseStretch = 1
          + Math.max(0, stretch - 1) * Math.pow(1 - t, 0.85) * 0.88
          + Math.max(0, leanBias - 1) * Math.pow(1 - t, 1.05) * 0.52;
        let r = p.x * stretch * leanBias * baseStretch;
        if (t > 0.94) r *= 0.92 + (mouthFlare - 1.0) * 0.42;
        return new THREE.Vector2(Math.max(r, 0.004), p.y);
      });
    }

    function finalizeProceduralProfile(profile, rng, formSeed, formType, meta, isCultural) {
      let p = profile;
      if (!isCultural && rng() < 0.34) {
        p = applyOrganicPasses(p, rng, meta);
      }
      p = refineProfileSilhouette(p, isCultural);
      if (profileSpikiness(p) > (isCultural ? 0.028 : 0.042)) {
        p = refineProfileSilhouette(smoothSculpturalProfile(profile, 2), isCultural);
      }
      p = applyProfileSeedVariation(
        p,
        rng,
        formSeed,
        isCultural
          ? (formType === 'MoonJar' ? 0.18 : formType === 'Maebyeong' ? 0.14 : formType === 'WhitePorcelain' ? 0.2 : 0.36)
          : 1.22
      );
      p = refineProfileSilhouette(p, isCultural);
      p = ensureCeramicSilhouette(p, rng, isCultural);
      return p;
    }

    function profilePotteryDeparturePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      const peakT = maxIdx / Math.max(n - 1, 1);
      const mouthR = profile[n - 1].x;
      const baseR = profile[Math.floor(n * 0.05)].x;
      const midR = profile[Math.floor(n * 0.48)].x;

      let penalty = 0;
      if (peakT > 0.84) penalty += 2.4;
      if (mouthR / Math.max(maxR, 0.01) < 0.24) penalty += 1.5;
      if (baseR / Math.max(maxR, 0.01) < 0.16) penalty += 1.8;
      if (midR / Math.max(maxR, 0.01) < 0.3) penalty += 1.4;
      if (profileSlendernessScore(profile) > 0.28) penalty += 1.6;
      if (profileCapsuleScore(profile) > 0.28) penalty += 1.6;
      penalty += profileBoxinessScore(profile) * 2.4;
      penalty += profileShoulderCornerPenalty(profile) * 1.5;
      penalty += profileTrapezoidBasePenalty(profile) * 1.2;
      penalty += profileMaxAngularJump(profile) * 42;
      penalty += profileFootSpindlePenalty(profile) * 2.2;
      return penalty;
    }

    function isPotteryFormType(formType) {
      if (CULTURAL_ROUND_ARCHETYPES.includes(formType)) return true;
      if (!formType || !String(formType).startsWith('Hybrid:')) return false;
      return String(formType).replace('Hybrid:', '').split('/')
        .every((id) => CULTURAL_ROUND_ARCHETYPES.includes(id));
    }

    function passesPotterySilhouette(data) {
      if (!isPotteryFormType(data.formType)) return false;
      if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) return false;
      if (profileMaxAngularJump(data.profile) > 0.0075) return false;
      if (profileFootSpindlePenalty(data.profile) > 0.08) return false;
      if (profileBoxinessScore(data.profile) > MAX_BOXINESS_SCORE) return false;
      if (profileShoulderCornerPenalty(data.profile) > 0.35) return false;
      if (profileTrapezoidBasePenalty(data.profile) > 0.5) return false;
      if (profileCapsuleScore(data.profile) > MAX_CAPSULE_SCORE) return false;
      if (culturalProfileScore(data) < 0.36) return false;
      return profilePotteryDeparturePenalty(data.profile) < 0.32;
    }

    function generateHybridSilhouette(rng, detail = PROFILE_POINTS, variationKey = 0) {
      const rand = rng;
      let idA = CULTURAL_ROUND_ARCHETYPES[Math.floor(rand() * CULTURAL_ROUND_ARCHETYPES.length)];
      let idB = CULTURAL_ROUND_ARCHETYPES[Math.floor(rand() * CULTURAL_ROUND_ARCHETYPES.length)];
      while (idB === idA) {
        idB = CULTURAL_ROUND_ARCHETYPES[Math.floor(rand() * CULTURAL_ROUND_ARCHETYPES.length)];
      }
      const fnA = RADIUS_BY_ARCHETYPE[idA];
      const fnB = RADIUS_BY_ARCHETYPE[idB];
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const formType = `Hybrid:${idA}/${idB}`;
      const baseR = 0.28 + rand() * 0.2;
      const points = [];

      for (let i = 0; i < detail; i++) {
        const t = i / Math.max(detail - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        const rA = fnA(t, baseR, rand, formSeed);
        const rB = fnB(t, baseR * (0.88 + rand() * 0.18), rand, formSeed + 1337);
        const wRaw = 0.5 + 0.5 * Math.sin(t * Math.PI * (0.85 + rand() * 0.3) + formSeed * 0.004);
        const w = wRaw * wRaw * (3 - 2 * wRaw);
        points.push(new THREE.Vector2(Math.max(rA * (1 - w) + rB * w, 0.004), y));
      }

      const meta = {
        formSeed,
        formType,
        ribbed: false,
        shallow: rand() < 0.18,
        pinchDepth: 0.12 + rand() * 0.16,
        bulgeCount: 1 + Math.floor(rand() * 2),
        harmonicEnergy: 0.42 + rand() * 0.28,
        dripBias: 0.3 + rand() * 0.28,
        shellMouth: false,
        coilSteps: 2,
        slump: 0.22 + rand() * 0.22
      };

      const profile = finalizeProceduralProfile(points, rng, formSeed, formType, meta, true);
      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: profile[profile.length - 1].x,
        mouthY: profile[profile.length - 1].y,
        formSeed,
        formType,
        surfaceType: inferSurfaceType(rng, meta),
        latheSegments: 72 + Math.floor(rand() * 28),
        meta
      };
    }

    function generateProceduralSilhouette(rng, detail = PROFILE_POINTS, forcedArchetypeId = null, variationKey = 0) {
      const rand = rng;
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const formType = forcedArchetypeId
        || CULTURAL_ROUND_ARCHETYPES[Math.floor(rand() * CULTURAL_ROUND_ARCHETYPES.length)];
      const radiusFn = RADIUS_BY_ARCHETYPE[formType];
      const isCultural = ['MoonJar', 'Maebyeong', 'WhitePorcelain'].includes(formType);
      const baseR = isCultural ? 0.28 + rand() * 0.22 : 0.24 + rand() * 0.52;
      const points = [];

      for (let i = 0; i < detail; i++) {
        const t = i / Math.max(detail - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        const r = radiusFn(t, baseR, rand, formSeed);
        points.push(new THREE.Vector2(Math.max(r, 0.004), y));
      }

      const meta = {
        formSeed,
        formType,
        ribbed: rand() < 0.45,
        shallow: rand() < 0.3,
        pinchDepth: 0.14 + rand() * 0.36,
        bulgeCount: 2 + Math.floor(rand() * 5),
        harmonicEnergy: 0.4 + rand() * 0.6,
        dripBias: 0.3 + rand() * 0.65,
        shellMouth: rand() < 0.28,
        coilSteps: 2 + Math.floor(rand() * 6),
        slump: 0.32 + rand() * 0.62
      };

      let profile = finalizeProceduralProfile(points, rng, formSeed, formType, meta, isCultural);

      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: profile[profile.length - 1].x,
        mouthY: profile[profile.length - 1].y,
        formSeed,
        formType,
        surfaceType: inferSurfaceType(rng, meta),
        latheSegments: 72 + Math.floor(rand() * 24),
        meta
      };
    }

    function createExperimentalCeramicProfile(rng, detail = PROFILE_POINTS, forcedArchetypeId = null, variationKey = 0) {
      return generateProceduralSilhouette(rng, detail, forcedArchetypeId, variationKey);
    }

    const LATHE_SEGMENTS = 72;
    const MORPH_DURATION = 8.0 / 1.5;
    const HOLD_DURATION = 1.4 / 1.5;
    const BIRTH_DURATION = 4.8;
    const BIRTH_SPIRAL_TURNS = 2.6;
    const JAR_DISPLAY_SCALE = 1.575;
    const MORPH_PICK_ATTEMPTS = 28;
    const MIN_SILHOUETTE_DIFF = 0.30;
    const TARGET_SILHOUETTE_DIFF = 0.38;
    const MIN_HISTORY_DIFF = 0.24;
    const MIN_SIGNATURE_FROM_PREV = 0.38;
    const MIN_SIGNATURE_HISTORY = 0.28;
    const RECENT_FORM_LIMIT = 20;
    const RECENT_ARCHETYPE_BLOCK = 4;
    const MAX_PROFILE_SPIKINESS = 0.022;
    const MAX_CAPSULE_SCORE = 0.30;
    const MAX_BOXINESS_SCORE = 0.16;
    const MAX_SLENDERNESS_SCORE = 0.4;
    let recentFormHistory = [];
    let recentArchetypeHistory = [];

    function createInnerProfile(outerProfile, wall = 0.022) {
      return outerProfile.map((p) => {
        const innerR = Math.max(p.x - wall, 0.012);
        return new THREE.Vector2(innerR, p.y);
      });
    }

    function resampleProfileToCanonical(profile, numPoints = PROFILE_POINTS) {
      const srcYMin = profile[0].y;
      const srcYMax = profile[profile.length - 1].y;
      const srcSpan = Math.max(srcYMax - srcYMin, 1e-4);
      const points = [];

      for (let i = 0; i < numPoints; i++) {
        const cy = CANONICAL_Y_MIN + (CANONICAL_Y_MAX - CANONICAL_Y_MIN) * (i / (numPoints - 1));
        const sy = srcYMin + ((cy - CANONICAL_Y_MIN) / (CANONICAL_Y_MAX - CANONICAL_Y_MIN)) * srcSpan;
        let r = profile[profile.length - 1].x;
        for (let j = 1; j < profile.length; j++) {
          if (profile[j].y >= sy) {
            const tt = (sy - profile[j - 1].y) / Math.max(profile[j].y - profile[j - 1].y, 1e-6);
            r = profile[j - 1].x + tt * (profile[j].x - profile[j - 1].x);
            break;
          }
        }
        points.push(new THREE.Vector2(Math.max(r, 0.004), cy));
      }
      return points;
    }

    function packProfileData(raw, profile, rng) {
      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: profile[profile.length - 1].x,
        mouthY: profile[profile.length - 1].y,
        formSeed: raw.formSeed,
        formType: raw.formType,
        surfaceType: raw.surfaceType,
        latheSegments: raw.latheSegments || LATHE_SEGMENTS,
        colorShift: rng(),
        dispScale: 0.88 + rng() * 0.18
      };
    }

    function silhouetteDiff(a, b) {
      let diff = 0;
      const n = Math.min(a.profile.length, b.profile.length);
      for (let i = 0; i < n; i++) {
        diff += Math.abs(a.profile[i].x - b.profile[i].x);
      }
      return diff / Math.max(n, 1);
    }

    function extractFormSignature(data) {
      const n = data.profile.length;
      let maxR = 0;
      let maxIdx = 0;
      let peakCount = 0;
      for (let i = 1; i < n - 1; i++) {
        const r = data.profile[i].x;
        if (r > maxR) {
          maxR = r;
          maxIdx = i;
        }
      }
      let meanR = 0;
      for (let i = 0; i < n; i++) meanR += data.profile[i].x;
      meanR /= Math.max(n, 1);
      for (let i = 1; i < n - 1; i++) {
        const r = data.profile[i].x;
        if (r > data.profile[i - 1].x && r > data.profile[i + 1].x && r > meanR * 1.08) peakCount++;
      }
      const sig = analyzeProfileSignature(data);
      return {
        bellyT: maxIdx / Math.max(n - 1, 1),
        maxR,
        mouthRatio: data.mouthR / Math.max(maxR, 0.01),
        fullness: sig.fullness,
        waistR: sig.waistR,
        peakCount,
        volume: sig.volume,
        formType: data.formType
      };
    }

    function formSignatureDistance(a, b) {
      const sa = extractFormSignature(a);
      const sb = extractFormSignature(b);
      let d = 0;
      d += Math.abs(sa.bellyT - sb.bellyT) * 2.8;
      d += Math.abs(sa.maxR - sb.maxR) / Math.max(sa.maxR, 0.08) * 1.6;
      d += Math.abs(sa.mouthRatio - sb.mouthRatio) * 1.4;
      d += Math.abs(sa.fullness - sb.fullness) / Math.max(sa.fullness, 0.5) * 1.8;
      d += Math.abs(sa.peakCount - sb.peakCount) * 0.24;
      d += Math.abs(sa.waistR - sb.waistR) / Math.max(sa.waistR, 0.05) * 1.2;
      d += Math.abs(sa.volume - sb.volume) / Math.max(sa.volume, 0.02) * 0.35;
      if (sa.formType !== sb.formType) d += 0.42;
      return d;
    }

    function minHistorySignatureDiff(data, history = recentFormHistory) {
      if (!history.length) return Infinity;
      let min = Infinity;
      for (const prev of history) {
        min = Math.min(min, formSignatureDistance(data, prev));
      }
      return min;
    }

    function isSameArchetypeFamily(aType, bType) {
      if (aType === bType) return true;
      if (!aType || !bType) return false;
      if (aType.startsWith('Hybrid:') || bType.startsWith('Hybrid:')) return false;
      return false;
    }

    const CLASSIC_RADIUS_BY_TYPE = {
      MoonJar: classicMoonJarRadius,
      Maebyeong: classicMaebyeongRadius,
      WhitePorcelain: classicBaekjaRadius
    };

    function buildClassicCulturalData(archetypeId, rng, variationKey = 0) {
      const radiusFn = CLASSIC_RADIUS_BY_TYPE[archetypeId] || classicMoonJarRadius;
      const rand = rng;
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const baseR = 0.3 + rand() * 0.24;
      const points = [];
      for (let i = 0; i < PROFILE_POINTS; i++) {
        const t = i / Math.max(PROFILE_POINTS - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        points.push(new THREE.Vector2(
          Math.max(radiusFn(t, baseR, rand, formSeed), 0.004),
          y
        ));
      }
      let profile = smoothSculpturalProfile(points, 3);
      profile = capProfileSlopes(profile, 0.004);
      profile = smoothSculpturalProfile(profile, 2);
      profile = applyProfileSeedVariation(
        profile,
        rng,
        formSeed,
        archetypeId === 'Maebyeong' ? 0.08 : archetypeId === 'MoonJar' ? 0.1 : 0.12
      );
      profile = ensureCeramicSilhouette(profile, rng, true);
      return packProfileData({
        formSeed,
        formType: archetypeId,
        surfaceType: 0,
        latheSegments: LATHE_SEGMENTS
      }, profile, rng);
    }

    function buildClassicMoonJarData(rng, variationKey = 0) {
      return buildClassicCulturalData('MoonJar', rng, variationKey);
    }

    function buildProfileData(rng, forcedArchetypeId = null, variationKey = 0) {
      if (forcedArchetypeId === '__CLASSIC__') {
        const classicId = CLASSIC_CULTURAL_ROTATION[
          Math.abs(variationKey) % CLASSIC_CULTURAL_ROTATION.length
        ];
        return buildClassicCulturalData(classicId, rng, variationKey);
      }
      let best = null;
      let bestMetric = -Infinity;
      const attempts = forcedArchetypeId === '__HYBRID__' ? 14 : 16;
      for (let attempt = 0; attempt < attempts; attempt++) {
        const raw = forcedArchetypeId === '__HYBRID__'
          ? generateHybridSilhouette(rng, PROFILE_POINTS, variationKey + attempt * 613)
          : createExperimentalCeramicProfile(
            rng,
            PROFILE_POINTS,
            forcedArchetypeId,
            variationKey + attempt * 613
          );
        const profile = ensureCeramicSilhouette(
          resampleProfileToCanonical(raw.profile),
          rng,
          ['MoonJar', 'Maebyeong', 'WhitePorcelain'].includes(raw.formType)
        );
        const data = packProfileData(raw, profile, rng);
        const capsule = profileCapsuleScore(data.profile);
        const slender = profileSlendernessScore(data.profile);
        if (capsule > MAX_CAPSULE_SCORE) continue;
        if (slender > MAX_SLENDERNESS_SCORE) continue;
        if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) continue;
        if (!passesPotterySilhouette(data)) continue;
        const roundness = culturalProfileScore(data);
        const metric = beautyScore(data) + roundness * 1.6 - capsule * (roundness > 0.58 ? 0.9 : 2.5) - slender * 3.2;
        if (metric > bestMetric) {
          bestMetric = metric;
          best = data;
        }
        if (capsule < 0.28 && metric > 1.2) break;
      }
      if (best) return best;
      return buildClassicCulturalData(
        CULTURAL_ROUND_ARCHETYPES[variationKey % CULTURAL_ROUND_ARCHETYPES.length],
        rng,
        variationKey
      );
    }

    function rememberForm(data) {
      recentFormHistory.push({
        profile: data.profile.map((p) => p.clone()),
        formType: data.formType,
        formSeed: data.formSeed,
        mouthR: data.mouthR
      });
      if (recentFormHistory.length > RECENT_FORM_LIMIT) recentFormHistory.shift();
      recentArchetypeHistory.push(data.formType);
      if (recentArchetypeHistory.length > RECENT_ARCHETYPE_BLOCK + 2) {
        recentArchetypeHistory.shift();
      }
    }

    function minHistorySilhouetteDiff(data, history = recentFormHistory) {
      if (!history.length) return Infinity;
      let min = Infinity;
      for (const prev of history) {
        min = Math.min(min, silhouetteDiff(data, prev));
      }
      return min;
    }

    function profileDataFromSeed(seed) {
      return buildProfileData(mulberry32(seed), null, seed);
    }

    function profileDataForArchetype(archetypeId, seed) {
      let best = null;
      let bestSil = -1;
      for (let i = 0; i < 40; i++) {
        const data = buildProfileData(mulberry32(seed + i * 4817), archetypeId);
        if (!best || data.formSeed > best.formSeed) {
          best = data;
          bestSil = i;
        }
      }
      return best;
    }

    function shuffledArchetypeCandidates(fromType, seed) {
      const rng = mulberry32(seed ^ 0x9e3779b9);
      const blocked = new Set([fromType]);
      for (const id of recentArchetypeHistory.slice(-RECENT_ARCHETYPE_BLOCK)) blocked.add(id);
      let list = CULTURAL_ROUND_ARCHETYPES.filter((id) => !blocked.has(id));
      if (list.length < 2) {
        list = CULTURAL_ROUND_ARCHETYPES.filter((id) => id !== fromType);
      }
      list = ['__CLASSIC__', ...list.filter((id) => id !== '__CLASSIC__')];
      if (list.length < 3) list.push('__HYBRID__');
      else list.splice(2, 0, '__HYBRID__');
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function passesNoveltyGate(fromData, data, strict = true) {
      if (isSameArchetypeFamily(fromData.formType, data.formType)) return false;
      const sil = silhouetteDiff(fromData, data);
      const hist = minHistorySilhouetteDiff(data);
      const sigFrom = formSignatureDistance(fromData, data);
      const sigHist = minHistorySignatureDiff(data);
      if (strict) {
        return sil >= MIN_SILHOUETTE_DIFF
          && hist >= MIN_HISTORY_DIFF
          && sigFrom >= MIN_SIGNATURE_FROM_PREV
          && sigHist >= MIN_SIGNATURE_HISTORY;
      }
      return sil >= MIN_SILHOUETTE_DIFF * 0.82
        && hist >= MIN_HISTORY_DIFF * 0.82
        && sigFrom >= MIN_SIGNATURE_FROM_PREV * 0.78
        && sigHist >= MIN_SIGNATURE_HISTORY * 0.78;
    }

    function createContrastingSearch(fromData, seed, morphIndex = 0) {
      return {
        fromData,
        seed,
        morphIndex,
        preferClassic: morphIndex % CLASSIC_MOJAR_INTERVAL === 0,
        classicTried: false,
        candidates: shuffledArchetypeCandidates(fromData.formType, seed + morphIndex * 1543),
        c: 0,
        i: 0,
        fallbackI: 0,
        phase: 'main',
        best: null,
        bestMetric: -1,
        bestRelaxed: null,
        bestRelaxedMetric: -1,
        done: false,
        result: null
      };
    }

    function stepContrastingSearch(state) {
      if (state.done) return state;

      if (state.preferClassic && !state.classicTried) {
        state.classicTried = true;
        const classicId = CLASSIC_CULTURAL_ROTATION[state.morphIndex % CLASSIC_CULTURAL_ROTATION.length];
        const classic = buildClassicCulturalData(
          classicId,
          mulberry32(state.seed + state.morphIndex * 31817 + 48271),
          state.seed + state.morphIndex * 13337
        );
        if (culturalProfileScore(classic) >= 0.48
          && profileSpikiness(classic.profile) <= MAX_PROFILE_SPIKINESS
          && passesNoveltyGate(state.fromData, classic, false)) {
          state.result = classic;
          state.done = true;
          return state;
        }
      }

      if (state.phase === 'main') {
        if (state.c >= state.candidates.length) {
          if (state.best) {
            state.result = state.best;
            state.done = true;
            return state;
          }
          if (state.bestRelaxed) {
            state.result = state.bestRelaxed;
            state.done = true;
            return state;
          }
          state.phase = 'fallback';
          return state;
        }

        const archetypeId = state.candidates[state.c];
        if (state.i >= MORPH_PICK_ATTEMPTS) {
          state.c++;
          state.i = 0;
          return state;
        }

        const variationKey = state.seed + state.c * 5923 + state.i * 7919 + state.morphIndex * 13337;
        const data = buildProfileData(mulberry32(variationKey), archetypeId, variationKey);
        state.i++;

        if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) return state;
        if (!passesPotterySilhouette(data)) return state;
        if (profileCapsuleScore(data.profile) > MAX_CAPSULE_SCORE) return state;
        if (profileSlendernessScore(data.profile) > MAX_SLENDERNESS_SCORE) return state;
        if (isSameArchetypeFamily(state.fromData.formType, data.formType)) return state;

        const sil = silhouetteDiff(state.fromData, data);
        const hist = minHistorySilhouetteDiff(data);
        const sigFrom = formSignatureDistance(state.fromData, data);
        const sigHist = minHistorySignatureDiff(data);
        const contrast = contrastScore(state.fromData, data);
        const roundness = culturalProfileScore(data);
        const capsulePenalty = roundness > 0.58 ? 1.4 : 5;
        const culturalBonus = CULTURAL_ROUND_ARCHETYPES.includes(data.formType) ? 4.8 : 0;
        const metric = sil * 26 + hist * 22 + sigFrom * 20 + sigHist * 18 + contrast * 1.1 + 4.2
          + beautyScore(data) * 1.6

        uColorLightPrev: { value: CERAMIC_LIGHT.clone() },
        uColorMorphT: { value: 1 },
        uColorSurreal: { value: surrealAccent.clone() },
        uBgColor: { value: bgColor },
        uLightPos: { value: surfaceLight.position.clone() },
        uInterior: { value: 0 },
        uDispScale: { value: 1.0 },
        uJarYMin: { value: yMin },
        uJarYRange: { value: yRange },
        uFormSeed: { value: formSeed },
        uSurfaceType: { value: surfaceType },
        uMorphing: { value: 0 },
        uBirthProgress: { value: 1 },
        uBirthSpiralTurns: { value: BIRTH_SPIRAL_TURNS },
        uBirthActive: { value: 0 },
        uBecoming: { value: 0.12 },
        uAppear: { value: 0 },
        uStreamMode: { value: 0 },
        uStreamReveal: { value: 1 },
        uPerfTier: { value: 1 },
        uWaterWhite: { value: WATER_WHITE.clone() },
        uUnderwaterHaze: { value: UNDERWATER_HAZE.clone() }
      };
    }

    function profileAtSpiralFlow(data, progress, turns = BIRTH_SPIRAL_TURNS) {
      const flow = smoothMorphT(progress);
      const front = flow * (1 + turns);
      const profile = data.profile.map((p) => {
        const heightT = (CANONICAL_Y_MAX - p.y) / data.yRange;
        const wet = smoothMorphT(Math.min(1, Math.max(0, (front - heightT) / 0.22)));
        return new THREE.Vector2(Math.max(0.004, p.x * wet), p.y);
      });
      const rimWet = smoothMorphT(Math.min(1, flow * 1.05));
      return {
        profile,
        yMin: data.yMin,
        yRange: data.yRange,
        mouthR: data.mouthR * rimWet,
        mouthY: data.mouthY
      };
    }

    function lerpProfileGeometry(a, b, t) {
      const ease = smoothMorphT(t);
      const n = Math.min(a.profile.length, b.profile.length);
      const profile = [];
      for (let i = 0; i < n; i++) {
        profile.push(new THREE.Vector2(
          a.profile[i].x + (b.profile[i].x - a.profile[i].x) * ease,
          a.profile[i].y + (b.profile[i].y - a.profile[i].y) * ease
        ));
      }
      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: a.mouthR + (b.mouthR - a.mouthR) * ease,
        mouthY: a.mouthY + (b.mouthY - a.mouthY) * ease
      };
    }

    function finalizeLatheGeometry(geometry, segments, profileLen) {
      geometry.computeVertexNormals();
      syncLatheSeamNormals(geometry, segments, profileLen);
      return geometry;
    }

    function syncLatheSeamNormals(geometry, segments, profileLen) {
      const norm = geometry.attributes.normal;
      if (!norm) return;
      const narr = norm.array;
      for (let j = 0; j < profileLen; j++) {
        const i0 = j * 3;
        const iN = (segments * profileLen + j) * 3;
        const nx = (narr[i0] + narr[iN]) * 0.5;
        const ny = (narr[i0 + 1] + narr[iN + 1]) * 0.5;
        const nz = (narr[i0 + 2] + narr[iN + 2]) * 0.5;
        const len = Math.hypot(nx, ny, nz) || 1;
        narr[i0] = narr[iN] = nx / len;
        narr[i0 + 1] = narr[iN + 1] = ny / len;
        narr[i0 + 2] = narr[iN + 2] = nz / len;
      }
      norm.needsUpdate = true;
    }

    function updateLatheGeometryInPlace(geometry, profile, segments) {
      const pos = geometry.attributes.position;
      if (!pos || pos.count !== (segments + 1) * profile.length) return false;
      const arr = pos.array;
      let idx = 0;
      for (let i = 0; i <= segments; i++) {
        const phi = (i / segments) * Math.PI * 2;
        const sinPhi = Math.sin(phi);
        const cosPhi = Math.cos(phi);
        for (let j = 0; j < profile.length; j++) {
          const r = profile[j].x;
          const y = profile[j].y;
          arr[idx++] = r * sinPhi;
          arr[idx++] = y;
          arr[idx++] = r * cosPhi;
        }
      }
      pos.needsUpdate = true;
      updateLatheNormalsInPlace(geometry, profile, segments);
      syncLatheSeamNormals(geometry, segments, profile.length);
      return true;
    }

    function updateLatheNormalsInPlace(geometry, profile, segments) {
      const norm = geometry.attributes.normal;
      if (!norm) return;
      const narr = norm.array;
      const profileLen = profile.length;
      for (let i = 0; i <= segments; i++) {
        const sinP = Math.sin((i / segments) * Math.PI * 2);
        const cosP = Math.cos((i / segments) * Math.PI * 2);
        for (let j = 0; j < profileLen; j++) {
          const j0 = Math.max(0, j - 1);
          const j1 = Math.min(profileLen - 1, j + 1);
          const dr = profile[j1].x - profile[j0].x;
          const dy = profile[j1].y - profile[j0].y;
          const ds = Math.max(Math.hypot(dr, dy), 1e-5);
          const nr = -dy / ds;
          const ny = dr / ds;
          const idx = (i * profileLen + j) * 3;
          const nx = nr * sinP;
          const nz = nr * cosP;
          const len = Math.hypot(nx, ny, nz) || 1;
          narr[idx] = nx / len;
          narr[idx + 1] = ny / len;
          narr[idx + 2] = nz / len;
        }
      }
      norm.needsUpdate = true;
    }

    function updateInnerProfileInPlace(outerProfile, innerOut, wall = 0.022) {
      const n = outerProfile.length;
      while (innerOut.length < n) innerOut.push(new THREE.Vector2());
      for (let i = 0; i < n; i++) {
        const p = outerProfile[i];
        innerOut[i].x = Math.max(p.x - wall, 0.012);
        innerOut[i].y = p.y;
      }
      innerOut.length = n;
      return innerOut;
    }

    function applyProfileGeometryToJar(jar, geo, innerScratch = null, options = {}) {
      const { skipInner = true } = options;
      const segments = jar.latheSegments;

      if (!updateLatheGeometryInPlace(jar.outer.geometry, geo.profile, segments)) {
        const outerGeo = finalizeLatheGeometry(
          new THREE.LatheGeometry(geo.profile, segments),
          segments,
          geo.profile.length
        );
        jar.outer.geometry.dispose();
        jar.outer.geometry = outerGeo;
      }

      if (!skipInner) {
        const innerSegments = jar.innerSegments;
        const innerProfile = innerScratch
          ? updateInnerProfileInPlace(geo.profile, innerScratch)
          : createInnerProfile(geo.profile);
        if (!updateLatheGeometryInPlace(jar.inner.geometry, innerProfile, innerSegments)) {
          const innerGeo = new THREE.LatheGeometry(innerProfile, innerSegments);
          innerGeo.computeVertexNormals();
          jar.inner.geometry.dispose();
          jar.inner.geometry = innerGeo;
        }
      }

      const mouthScale = geo.mouthR / jar.baseMouthR;
      jar.meniscus.position.y = geo.mouthY;
      jar.meniscus.scale.set(mouthScale * 0.82, mouthScale * 0.82, 1);
    }

    function applyMorphUniforms(jar, data) {
      applyShapeUniforms(jar, data);
      finishColorMorph(jar, data.colorShift);
    }

    function applyProfileToJar(jar, data) {
      applyProfileGeometryToJar(jar, data);
      applyMorphUniforms(jar, data);
    }

    function buildMorphingJar(initialData) {
      const group = new THREE.Group();
      group.position.set(0, 0, 0);
      group.rotation.y = Math.PI / LATHE_SEGMENTS;
      group.scale.setScalar(JAR_DISPLAY_SCALE);

      const outerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      outerUniforms.uDispScale.value = initialData.dispScale;
      outerUniforms.uAppear.value = 0;
      applyColorsFromShift(outerUniforms, initialData.colorShift);
      snapshotColorsToPrev(outerUniforms);

      const outerGeo = finalizeLatheGeometry(
        new THREE.LatheGeometry(initialData.profile, LATHE_SEGMENTS),
        LATHE_SEGMENTS,
        initialData.profile.length
      );
      const outer = new THREE.Mesh(outerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: outerUniforms,
        transparent: true,
        side: THREE.FrontSide,
        depthWrite: false
      }));
      group.add(outer);
      outer.renderOrder = 1;

      const innerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      innerUniforms.uInterior.value = 1;
      innerUniforms.uDispScale.value = initialData.dispScale * 0.32;
      innerUniforms.uAppear.value = 0;
      innerUniforms.uTime = outerUniforms.uTime;
      applyColorsFromShift(innerUniforms, initialData.colorShift);
      snapshotColorsToPrev(innerUniforms);

      const innerGeo = new THREE.LatheGeometry(createInnerProfile(initialData.profile), LATHE_SEGMENTS - 16);
      innerGeo.computeVertexNormals();
      const inner = new THREE.Mesh(innerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: innerUniforms,
        transparent: true,
        side: THREE.BackSide,
        depthWrite: false
      }));
      inner.visible = false;
      group.add(inner);

      const meniscus = new THREE.Mesh(
        new THREE.CircleGeometry(initialData.mouthR * 0.82, 28),
        new THREE.MeshBasicMaterial({
          color: 0xeaf6fc,
          transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false
        })
      );
      meniscus.rotation.x = -Math.PI / 2;
      meniscus.position.set(0, initialData.mouthY, 0);
      group.add(meniscus);

      fieldGroup.add(group);

      return {
        group,
        outer,
        inner,
        meniscus,
        outerUniforms,
        innerUniforms,
        latheSegments: LATHE_SEGMENTS,
        innerSegments: Math.max(48, LATHE_SEGMENTS - 16),
        baseMouthR: initialData.mouthR,
        timeOffset: initialData.formSeed * 0.01
      };
    }

    function easeSineOut(t) {
      return Math.sin(t * Math.PI * 0.5);
    }

    function easeSineInOut(t) {
      return -(Math.cos(Math.PI * t) - 1) * 0.5;
    }

    let birthState = null;

    function runWaterBirth(jar, targetData, onComplete) {
      snapshotJarColorsToPrev(jar);
      applyColorsFromShift(jar.outerUniforms, targetData.colorShift);
      applyColorsFromShift(jar.innerUniforms, targetData.colorShift);
      jar.outerUniforms.uColorMorphT.value = 0;
      jar.innerUniforms.uColorMorphT.value = 0;
      jar.outerUniforms.uFormSeed.value = targetData.formSeed;
      jar.innerUniforms.uFormSeed.value = targetData.formSeed;
      jar.outerUniforms.uSurfaceType.value = targetData.surfaceType;
      jar.innerUniforms.uSurfaceType.value = targetData.surfaceType;
      jar.outerUniforms.uDispScale.value = targetData.dispScale;
      jar.innerUniforms.uDispScale.value = targetData.dispScale * 0.32;
      jar.outerUniforms.uJarYMin.value = targetData.yMin;
      jar.outerUniforms.uJarYRange.value = targetData.yRange;
      jar.innerUniforms.uJarYMin.value = targetData.yMin;
      jar.innerUniforms.uJarYRange.value = targetData.yRange;
      jar.outerUniforms.uBirthActive.value = 0;
      jar.innerUniforms.uBirthActive.value = 0;
      jar.outerUniforms.uBirthProgress.value = 1;
      jar.innerUniforms.uBirthProgress.value = 1;
      jar.outerUniforms.uBecoming.value = 0.22;
      jar.innerUniforms.uBecoming.value = 0.22;
      applyProfileGeometryToJar(jar, targetData);
      birthState = {
        jar,
        targetData,
        startTime: performance.now(),
        duration: BIRTH_DURATION * 1000,
        onComplete
      };
      setMorphingState(jar, false);
    }

    function updateBirthAnimation(now) {
      if (!birthState) return;
      const { jar, targetData, startTime, duration, onComplete } = birthState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const t = easeSineOut(rawT);

      jar.outerUniforms.uBirthProgress.value = t;
      jar.innerUniforms.uBirthProgress.value = t;
      jar.outerUniforms.uBecoming.value = 0.18 + t * 0.08;
      jar.innerUniforms.uBecoming.value = jar.outerUniforms.uBecoming.value;
      setColorMorphProgress(jar, t);
      jar.outerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.innerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.meniscus.material.opacity = Math.min(0.2, Math.max(0, (t - 0.85) * 1.4));
      jar.meniscus.material.color.lerpColors(
        midColorFromShift(targetData.colorShift),
        WATER_WHITE,
        Math.min(1, t * 0.85)
      );

      if (rawT >= 1) {
        applyProfileGeometryToJar(jar, targetData);
        applyShapeUniforms(jar, targetData);
        finishColorMorph(jar, targetData.colorShift);
        jar.outerUniforms.uAppear.value = 1;
        jar.innerUniforms.uAppear.value = 1;
        jar.meniscus.material.opacity = 0.2;
        jar.meniscus.material.color.copy(WATER_WHITE);
        jar.outerUniforms.uBirthActive.value = 0;
        jar.innerUniforms.uBirthActive.value = 0;
        jar.outerUniforms.uBirthProgress.value = 1;
        jar.innerUniforms.uBirthProgress.value = 1;
        setMorphingState(jar, false);
        birthState = null;
        if (onComplete) onComplete();
      }
    }

    let morphJar = null;
    let morphSeed = Math.floor(Math.random() * 999999);
    let morphGen = 0;
    let currentForm = null;
    let morphState = null;
    let morphTimer = null;
    const morphPrefetch = { target: null, gen: -1, busy: false, search: null, waitSince: 0 };
    const morphScratch = {
      profile: [],
      inner: [],
      geo: {
        profile: null,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: 0,
        mouthY: 0
      }
    };

    function finalizeMorphPrefetchIfDone() {
      if (!morphPrefetch.search?.done) return;
      morphPrefetch.target = morphPrefetch.search.result;
      morphPrefetch.gen = morphPrefetch.search.morphIndex;
      morphPrefetch.search = null;
      morphPrefetch.busy = false;
    }

    function runMorphPrefetchBudget(budgetMs = 5) {
      if (!morphPrefetch.search) return;
      const budgetStart = performance.now();
      while (!morphPrefetch.search.done && performance.now() - budgetStart < budgetMs) {
        stepContrastingSearch(morphPrefetch.search);
      }
      finalizeMorphPrefetchIfDone();
    }

    function pumpMorphPrefetch() {
      runMorphPrefetchBudget(8);
      if (morphPrefetch.search) {
        if (typeof requestIdleCallback !== 'undefined') {
          requestIdleCallback(pumpMorphPrefetch, { timeout: 1200 });
        } else {
          setTimeout(pumpMorphPrefetch, 32);
        }
      }
    }

    function prefetchNextMorph() {
      if (!currentForm) return;
      const nextGen = morphGen + 1;
      if (morphPrefetch.target && morphPrefetch.gen === nextGen) return;
      if (morphPrefetch.busy) return;

      morphPrefetch.busy = true;
      morphPrefetch.search = createContrastingSearch(
        currentForm,
        morphSeed + nextGen * 7919,
        nextGen
      );
      pumpMorphPrefetch();
    }

    function resolveMorphTarget(pendingGen) {
      if (morphPrefetch.target && morphPrefetch.gen === pendingGen) {
        const target = morphPrefetch.target;
        morphPrefetch.target = null;
        morphPrefetch.gen = -1;
        return target;
      }
      return pickQuickMorphTarget(
        currentForm,
        morphSeed + pendingGen * 7919,
        pendingGen
      );
    }

    function lerpProfileInto(fromData, toData, t, out) {
      const ease = smoothMorphT(t);
      const n = Math.min(fromData.profile.length, toData.profile.length);
      while (out.length < n) out.push(new THREE.Vector2());
      for (let i = 0; i < n; i++) {
        out[i].x = fromData.profile[i].x + (toData.profile[i].x - fromData.profile[i].x) * ease;
        out[i].y = fromData.profile[i].y + (toData.profile[i].y - fromData.profile[i].y) * ease;
      }
      out.length = n;
      capProfileSlopes(out, 0.005);
      const footFixed = normalizeCeramicFoot(out);
      for (let i = 0; i < n; i++) {
        out[i].x = footFixed[i].x;
        out[i].y = footFixed[i].y;
      }
      const relaxed = relaxBoxyWalls(out);
      for (let i = 0; i < n; i++) {
        out[i].x = relaxed[i].x;
        out[i].y = relaxed[i].y;
      }
      morphScratch.geo.profile = out;
      morphScratch.geo.mouthR = fromData.mouthR + (toData.mouthR - fromData.mouthR) * ease;
      morphScratch.geo.mouthY = fromData.mouthY + (toData.mouthY - fromData.mouthY) * ease;
      return morphScratch.geo;
    }

    function updateMorphAnimation(now) {
      if (!morphState) return;
      const { from, to, startTime, duration } = morphState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const t = easeSineInOut(rawT);

      lerpProfileInto(from, to, t, morphScratch.profile);
      const geo = morphScratch.geo;
      applyProfileGeometryToJar(morphJar, geo, morphScratch.inner, { skipInner: true });
      perf.lastGeoUpdate = now;
      applyAppearanceLerp(morphJar, from, to, t, morphState.startBecoming);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;

      if (rawT >= 1) {
        applyProfileGeometryToJar(morphJar, to);
        applyShapeUniforms(morphJar, to);
        finishColorMorph(morphJar, to.colorShift);
        setMorphingState(morphJar, false);
        morphJar.outerUniforms.uBirthActive.value = 0;
        morphJar.innerUniforms.uBirthActive.value = 0;
        morphJar.outerUniforms.uBirthProgress.value = 1;
        morphJar.innerUniforms.uBirthProgress.value = 1;
        currentForm = to;
        morphState = null;
        rememberForm(to);
        morphTimer = setTimeout(scheduleNextMorph, HOLD_DURATION * 1000);
        prefetchNextMorph();
      }
    }

    function scheduleNextMorph() {
      if (morphTimer) clearTimeout(morphTimer);
      const pendingGen = morphGen + 1;

      if (!morphPrefetch.target || morphPrefetch.gen !== pendingGen) {
        if (!morphPrefetch.busy) prefetchNextMorph();
        if (!morphPrefetch.waitSince) morphPrefetch.waitSince = performance.now();
        if (performance.now() - morphPrefetch.waitSince <= 700) {
          morphTimer = setTimeout(scheduleNextMorph, 24);
          return;
        }
        morphPrefetch.waitSince = 0;
      } else {
        morphPrefetch.waitSince = 0;
      }

      morphGen = pendingGen;
      const targetForm = resolveMorphTarget(pendingGen);
      beginColorMorph(morphJar, targetForm.colorShift);
      setMorphingState(morphJar, true);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;
      morphJar.outerUniforms.uBirthProgress.value = 1;
      morphJar.innerUniforms.uBirthProgress.value = 1;
      perf.lastGeoUpdate = 0;
      morphState = {
        from: currentForm,
        to: targetForm,
        startTime: performance.now(),
        duration: MORPH_DURATION * 1000,
        startBecoming: morphJar.outerUniforms.uBecoming.value
      };
      prefetchNextMorph();
    }

    function initMorphingJar() {
      morphSeed = Math.floor(Math.random() * 999999);
      morphGen = 1;
      recentFormHistory = [];
      recentArchetypeHistory = [];
      const startArchetype = CULTURAL_ROUND_ARCHETYPES[
        Math.floor(Math.random() * CULTURAL_ROUND_ARCHETYPES.length)
      ];
      currentForm = buildClassicCulturalData(
        startArchetype,
        mulberry32(morphSeed),
        morphSeed
      );
      rememberForm(currentForm);
      morphJar = buildMorphingJar(currentForm);
      runWaterBirth(morphJar, currentForm, () => {
        morphTimer = setTimeout(scheduleNextMorph, 420);
        prefetchNextMorph();
      });
    }

    initMorphingJar();

    gsap.to(surfaceLightAnchor.position, {
      x: 0.8,
      duration: 22,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1
    });

    // ── Render Loop ───────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const perf = {
      geoInterval: 32,
      lastGeoUpdate: 0
    };

    function animate() {
      const frameStart = performance.now();
      const elapsed = clock.getElapsedTime();
      const now = frameStart;
      updateBirthAnimation(now);
      updateMorphAnimation(now);
      if (morphJar) {
        const t = elapsed * 1.15 + morphJar.timeOffset;
        morphJar.outerUniforms.uTime.value = t;
        morphJar.outerUniforms.uLightPos.value.copy(surfaceLight.position);
        if (!morphState && !birthState) {
          morphJar.outerUniforms.uBecoming.value = idleBecomingValue(elapsed);
          morphJar.innerUniforms.uBecoming.value = morphJar.outerUniforms.uBecoming.value;
        }
      }
      surfaceLight.position.copy(surfaceLightAnchor.position);
      rimLight.position.set(0, 0.5, 7);
      renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(animate);

    window.addEventListener('resize', resizeRenderSurface);
    resizeRenderSurface();
  </script>

      },

      }
    };

    const panel = document.getElementById('meaning-panel');

    const charBtns = document.querySelectorAll('.char-btn');

    function renderMeaning(key) {

      if (!data) return;

      let html = `
        <p class="text-[10px] tracking-[0.35em] uppercase text-cyan-300/80 mb-1">${data.reading}</p>
        <p class="font-serif text-3xl text-cyan-50 mb-2">${data.hanja}</p>
      `;

      if (data.compose) {
        html += `
          <div class="flex items-center gap-2 mb-3 text-sm text-cyan-100/90 font-serif">
            <span>획 분해</span>
            <span class="text-cyan-400/70">·</span>
            ${data.compose.map((part, i) => `
              ${i > 0 ? '<span class="text-cyan-400/70">+</span>' : ''}
              <button type="button" class="part-btn border border-cyan-300/30 rounded px-2 py-0.5 text-cyan-50 font-serif ${activeChar === part ? 'active' : ''}" data-char="${part}">${part}</button>
            `).join('')}
          </div>
        `;
      }

      html += `<p class="text-[13px] leading-relaxed text-cyan-100/90 font-serif">${data.body}</p>`;

      content.innerHTML = html;
      content.querySelectorAll('.part-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          showMeaning(btn.dataset.char);
        });
      });
    }

    function showMeaning(key) {
      if (activeChar === key) {
        hideMeaning();
        return;
      }
      activeChar = key;
      charBtns.forEach(btn => {
        const isRoot = btn.dataset.char === key || (key === '女' || key === '我') && btn.dataset.char === '娥';
        btn.classList.toggle('active', isRoot);
      });
      renderMeaning(key);
      panel.classList.add('visible');
    }

    function hideMeaning() {
      activeChar = null;
      charBtns.forEach(btn => btn.classList.remove('active'));
      panel.classList.remove('visible');
    }

    charBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showMeaning(btn.dataset.char);
      });
    });

    panel.addEventListener('click', (e) => e.stopPropagation());

    document.addEventListener('click', () => hideMeaning());
  </script>
</body>
</html>
