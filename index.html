    };

    function applyProfileSeedVariation(profile, rng, formSeed, intensity = 1) {
      const rand = rng;
      const radial = 0.78 + rand() * 0.44 * intensity;
      const warpFreq = 0.9 + rand() * 3.4;
      const warpAmp = (0.04 + rand() * 0.12) * intensity;
      const warpPhase = formSeed * 0.017 + rand() * Math.PI * 2;
      const mouthFlare = 0.82 + rand() * 0.36 * intensity;
      const lean = (rand() - 0.5) * 0.22 * intensity;
      const swellShift = (rand() - 0.5) * 0.18 * intensity;
      return profile.map((p, i, arr) => {
        const t = i / Math.max(arr.length - 1, 1);
        const warp = 1 + warpAmp * Math.sin(t * Math.PI * warpFreq + warpPhase);
        const swell = 1 + swellShift * Math.sin(t * Math.PI * (0.8 + rand() * 1.4) + warpPhase * 0.5);
        const stretch = radial * warp * swell;
        const leanBias = 1 + (t - 0.5) * lean;
        const baseStretch = 1
          + Math.max(0, stretch - 1) * Math.pow(1 - t, 0.85) * 0.88
          + Math.max(0, leanBias - 1) * Math.pow(1 - t, 1.05) * 0.52;
        let r = p.x * stretch * leanBias * baseStretch;
        if (t > 0.94) r *= 0.92 + (mouthFlare - 1.0) * 0.42;
        return new THREE.Vector2(Math.max(r, 0.004), p.y);
      });
    }

    function finalizeProceduralProfile(profile, rng, formSeed, formType, meta, isCultural) {
      const isSculptural = SCULPTURAL_ROUND_ARCHETYPES.includes(formType);
      const gentle = isCultural || isSculptural;
      let p = profile;
      if (!gentle && rng() < 0.34) {
        p = applyOrganicPasses(p, rng, meta);
      }
      p = refineProfileSilhouette(p, gentle);
      if (profileSpikiness(p) > (gentle ? 0.028 : 0.042)) {
        p = refineProfileSilhouette(smoothSculpturalProfile(profile, 2), gentle);
      }
      p = applyProfileSeedVariation(
        p,
        rng,
        formSeed,
        gentle
          ? (formType === 'MoonJar' ? 0.38
            : formType === 'Maebyeong' ? 0.34
            : formType === 'WhitePorcelain' ? 0.4
            : isSculptural ? 0.58
            : 0.36)
          : 1.22
      );
      if (gentle) p = enrichCeramicCurves(p, rng, isSculptural ? 0.48 : 0.62);
      p = refineProfileSilhouette(p, gentle);
      p = ensureCeramicSilhouette(p, rng, gentle);
      return p;
    }

    function profilePotteryDeparturePenalty(profile) {
      const n = profile.length;
      let maxR = 0;
      let maxIdx = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      const peakT = maxIdx / Math.max(n - 1, 1);
      const mouthR = profile[n - 1].x;
      const baseR = profile[Math.floor(n * 0.05)].x;
      const midR = profile[Math.floor(n * 0.48)].x;

      let penalty = 0;
      if (peakT > 0.84) penalty += 2.4;
      if (mouthR / Math.max(maxR, 0.01) < 0.18) penalty += 0.85;
      if (baseR / Math.max(maxR, 0.01) < 0.14) penalty += 1.2;
      if (midR / Math.max(maxR, 0.01) < 0.26) penalty += 0.85;
      if (profileSlendernessScore(profile) > 0.32) penalty += 1.2;
      if (profileThinGirthScore(profile) > 0.2) penalty += profileThinGirthScore(profile) * 1.8;
      if (profileCapsuleScore(profile) > 0.28) penalty += 1.6;
      penalty += profileBoxinessScore(profile) * 2.4;
      penalty += profileShoulderCornerPenalty(profile) * 1.5;
      penalty += profileTrapezoidBasePenalty(profile) * 1.2;
      penalty += profileMaxAngularJump(profile) * 42;
      penalty += profileFootSpindlePenalty(profile) * 2.2;
      return penalty;
    }

    function isPotteryFormType(formType) {
      if (CULTURAL_ROUND_ARCHETYPES.includes(formType)) return true;
      if (SCULPTURAL_ROUND_ARCHETYPES.includes(formType)) return true;
      if (!formType || !String(formType).startsWith('Hybrid:')) return false;
      return String(formType).replace('Hybrid:', '').split('/')
        .every((id) => MORPH_ARCHETYPE_POOL.includes(id));
    }

    function passesPotterySilhouette(data) {
      if (!isPotteryFormType(data.formType)) return false;
      const sculptural = isSculpturalPotteryType(data.formType);
      const curveBeauty = profileCurveBeautyScore(data.profile);
      if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) return false;
      if (profileMaxAngularJump(data.profile) > 0.0085) return false;
      if (profileFootSpindlePenalty(data.profile) > 0.08) return false;
      if (curveBeauty < MIN_CURVE_BEAUTY_SCORE) return false;
      if (profileThinGirthScore(data.profile) > MAX_THIN_GIRTH_SCORE && curveBeauty < 0.5) return false;
      if (profileSlendernessScore(data.profile) > MAX_SLENDERNESS_SCORE && curveBeauty < 0.46) return false;
      if (profileBoxinessScore(data.profile) > MAX_BOXINESS_SCORE) return false;
      if (profileShoulderCornerPenalty(data.profile) > 0.42) return false;
      if (profileTrapezoidBasePenalty(data.profile) > 0.55) return false;
      if (profileCapsuleScore(data.profile) > MAX_CAPSULE_SCORE && curveBeauty < (sculptural ? 0.36 : 0.42)) return false;
      if (culturalProfileScore(data) < (sculptural ? 0.24 : 0.32)) return false;
      return profilePotteryDeparturePenalty(data.profile) < (sculptural ? 0.62 : 0.42);
    }

    function generateHybridSilhouette(rng, detail = PROFILE_POINTS, variationKey = 0) {
      const rand = rng;
      let idA = MORPH_ARCHETYPE_POOL[Math.floor(rand() * MORPH_ARCHETYPE_POOL.length)];
      let idB = MORPH_ARCHETYPE_POOL[Math.floor(rand() * MORPH_ARCHETYPE_POOL.length)];
      while (idB === idA) {
        idB = MORPH_ARCHETYPE_POOL[Math.floor(rand() * MORPH_ARCHETYPE_POOL.length)];
      }
      const fnA = RADIUS_BY_ARCHETYPE[idA];
      const fnB = RADIUS_BY_ARCHETYPE[idB];
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const formType = `Hybrid:${idA}/${idB}`;
      const baseR = 0.24 + rand() * 0.28;
      const points = [];

      for (let i = 0; i < detail; i++) {
        const t = i / Math.max(detail - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        const rA = fnA(t, baseR, rand, formSeed);
        const rB = fnB(t, baseR * (0.72 + rand() * 0.36), rand, formSeed + 1337);
        const wRaw = 0.5 + 0.5 * Math.sin(t * Math.PI * (0.75 + rand() * 0.65) + formSeed * 0.004);
        const wRipple = 0.16 * Math.sin(t * Math.PI * (2.4 + rand() * 2.8) + formSeed * 0.013);
        const wBlend = wRaw + wRipple * Math.sin(t * Math.PI * 1.15);
        const w = Math.min(1, Math.max(0, wBlend * wBlend * (3 - 2 * wBlend)));
        points.push(new THREE.Vector2(Math.max(rA * (1 - w) + rB * w, 0.004), y));
      }

      const meta = {
        formSeed,
        formType,
        ribbed: false,
        shallow: rand() < 0.18,
        pinchDepth: 0.12 + rand() * 0.16,
        bulgeCount: 1 + Math.floor(rand() * 2),
        harmonicEnergy: 0.42 + rand() * 0.28,
        dripBias: 0.3 + rand() * 0.28,
        shellMouth: false,
        coilSteps: 2,
        slump: 0.22 + rand() * 0.22
      };

      const profile = finalizeProceduralProfile(points, rng, formSeed, formType, meta, true);
      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: profile[profile.length - 1].x,
        mouthY: profile[profile.length - 1].y,
        formSeed,
        formType,
        surfaceType: inferSurfaceType(rng, meta),
        latheSegments: 72 + Math.floor(rand() * 28),
        meta
      };
    }

    function generateProceduralSilhouette(rng, detail = PROFILE_POINTS, forcedArchetypeId = null, variationKey = 0) {
      const rand = rng;
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const resolvedId = resolveMorphArchetypeId(forcedArchetypeId, rand);
      const formType = resolvedId
        || MORPH_ARCHETYPE_POOL[Math.floor(rand() * MORPH_ARCHETYPE_POOL.length)];
      const radiusFn = RADIUS_BY_ARCHETYPE[formType];
      const isCultural = CULTURAL_ROUND_ARCHETYPES.includes(formType);
      const isSculptural = SCULPTURAL_ROUND_ARCHETYPES.includes(formType);
      const baseR = (isCultural || isSculptural)
        ? 0.24 + rand() * 0.3
        : 0.24 + rand() * 0.52;
      const points = [];

      for (let i = 0; i < detail; i++) {
        const t = i / Math.max(detail - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        const r = radiusFn(t, baseR, rand, formSeed);
        points.push(new THREE.Vector2(Math.max(r, 0.004), y));
      }

      const meta = {
        formSeed,
        formType,
        ribbed: rand() < 0.45,
        shallow: rand() < 0.3,
        pinchDepth: 0.14 + rand() * 0.36,
        bulgeCount: 2 + Math.floor(rand() * 5),
        harmonicEnergy: 0.4 + rand() * 0.6,
        dripBias: 0.3 + rand() * 0.65,
        shellMouth: rand() < 0.28,
        coilSteps: 2 + Math.floor(rand() * 6),
        slump: 0.32 + rand() * 0.62
      };

      let profile = finalizeProceduralProfile(points, rng, formSeed, formType, meta, isCultural || isSculptural);

      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: profile[profile.length - 1].x,
        mouthY: profile[profile.length - 1].y,
        formSeed,
        formType,
        surfaceType: inferSurfaceType(rng, meta),
        latheSegments: 72 + Math.floor(rand() * 24),
        meta
      };
    }

    function createExperimentalCeramicProfile(rng, detail = PROFILE_POINTS, forcedArchetypeId = null, variationKey = 0) {
      return generateProceduralSilhouette(rng, detail, forcedArchetypeId, variationKey);
    }

    const LATHE_SEGMENTS = 72;
    const FORM_CHANGE_INTERVAL = 2.0;
    const MORPH_DURATION = 1.55;
    const HOLD_DURATION = 0.08;
    const FAST_MORPH_ATTEMPTS = 5;
    const FAST_MORPH_PICKS = 6;
    const BIRTH_DURATION = 2.4;
    const BIRTH_SPIRAL_TURNS = 2.6;
    const JAR_DISPLAY_SCALE = 1.575;
    const MORPH_PICK_ATTEMPTS = 52;
    const MIN_SILHOUETTE_DIFF = 0.28;
    const TARGET_SILHOUETTE_DIFF = 0.46;
    const MIN_HISTORY_DIFF = 0.22;
    const MIN_SIGNATURE_FROM_PREV = 0.36;
    const MIN_SIGNATURE_HISTORY = 0.26;
    const RECENT_FORM_LIMIT = 18;
    const RECENT_ARCHETYPE_BLOCK = 1;
    const MAX_PROFILE_SPIKINESS = 0.022;
    const MAX_CAPSULE_SCORE = 0.30;
    const MAX_BOXINESS_SCORE = 0.16;
    const MAX_SLENDERNESS_SCORE = 0.38;
    const MAX_THIN_GIRTH_SCORE = 0.27;
    const MIN_CURVE_BEAUTY_SCORE = 0.26;
    let recentFormHistory = [];
    let recentArchetypeHistory = [];

    function createInnerProfile(outerProfile, wall = 0.022) {
      return outerProfile.map((p) => {
        const innerR = Math.max(p.x - wall, 0.012);
        return new THREE.Vector2(innerR, p.y);
      });
    }

    function resampleProfileToCanonical(profile, numPoints = PROFILE_POINTS) {
      const srcYMin = profile[0].y;
      const srcYMax = profile[profile.length - 1].y;
      const srcSpan = Math.max(srcYMax - srcYMin, 1e-4);
      const points = [];

      for (let i = 0; i < numPoints; i++) {
        const cy = CANONICAL_Y_MIN + (CANONICAL_Y_MAX - CANONICAL_Y_MIN) * (i / (numPoints - 1));
        const sy = srcYMin + ((cy - CANONICAL_Y_MIN) / (CANONICAL_Y_MAX - CANONICAL_Y_MIN)) * srcSpan;
        let r = profile[profile.length - 1].x;
        for (let j = 1; j < profile.length; j++) {
          if (profile[j].y >= sy) {
            const tt = (sy - profile[j - 1].y) / Math.max(profile[j].y - profile[j - 1].y, 1e-6);
            r = profile[j - 1].x + tt * (profile[j].x - profile[j - 1].x);
            break;
          }
        }
        points.push(new THREE.Vector2(Math.max(r, 0.004), cy));
      }
      return points;
    }

    function profileBounds(profile) {
      let yMin = profile[0].y;
      let yMax = profile[profile.length - 1].y;
      for (const p of profile) {
        yMin = Math.min(yMin, p.y);
        yMax = Math.max(yMax, p.y);
      }
      return {
        yMin,
        yMax,
        yRange: Math.max(yMax - yMin, 1e-4)
      };
    }

    function scaleProfileHeight(profile, scale, anchorY = null) {
      const baseY = anchorY ?? profile[0].y;
      return profile.map((p) => new THREE.Vector2(p.x, baseY + (p.y - baseY) * scale));
    }

    function computeFormHeightScale(profile, formType, formSeed = 0) {
      const type = String(formType || '');
      const n = profile.length;
      let maxIdx = 0;
      let maxR = 0;
      for (let i = 0; i < n; i++) {
        if (profile[i].x > maxR) {
          maxR = profile[i].x;
          maxIdx = i;
        }
      }
      const bellyT = maxIdx / Math.max(n - 1, 1);
      const seedJitter = ((formSeed * 0.00023) % 1);
      let scale = 1.0;

      if (type === 'MoonJar' || type.includes('MoonJar')) {
        scale = 0.84 + seedJitter * 0.13;
      } else if (type === 'Maebyeong' || type.includes('Maebyeong')) {
        scale = 1.04 + seedJitter * 0.18 + bellyT * 0.08;
      } else if (type === 'WhitePorcelain' || type.includes('WhitePorcelain')) {
        scale = 0.93 + seedJitter * 0.15 + bellyT * 0.06;
      } else if (type === 'SquatBowl' || type === 'OpenBowl' || type.includes('SquatBowl') || type.includes('OpenBowl')) {
        scale = 0.56 + seedJitter * 0.1;
      } else if (type === 'AmphoraCeramic' || type === 'WideShoulder'
        || type.includes('AmphoraCeramic') || type.includes('WideShoulder')) {
        scale = 1.14 + seedJitter * 0.22 + bellyT * 0.06;
      } else if (type === 'DiscNeck' || type.includes('DiscNeck')) {
        scale = 1.22 + seedJitter * 0.2;
      } else if (type === 'FlaredRim' || type.includes('FlaredRim')) {
        scale = 1.08 + seedJitter * 0.18 + bellyT * 0.08;
      } else if (type === 'PearGourd' || type.includes('PearGourd')) {
        scale = 0.98 + seedJitter * 0.16 + bellyT * 0.1;
      } else if (type === 'WaistFlare' || type.includes('WaistFlare')) {
        scale = 1.02 + seedJitter * 0.17 + bellyT * 0.08;
      } else if (type === 'PedestalBowl' || type.includes('PedestalBowl')) {
        scale = 0.82 + seedJitter * 0.14;
      } else if (type === 'TaperDream' || type.includes('TaperDream')) {
        scale = 1.06 + seedJitter * 0.18;
      } else if (type === 'CoilStack' || type === 'StackedTier' || type === 'MultiBulge'
        || type.includes('CoilStack') || type.includes('StackedTier') || type.includes('MultiBulge')) {
        scale = 0.88 + seedJitter * 0.26 + bellyT * 0.14;
      } else if (isSculpturalPotteryType(type)) {
        scale = 0.72 + seedJitter * 0.32 + bellyT * 0.16;
      } else {
        scale = 0.9 + seedJitter * 0.2 + bellyT * 0.1;
      }
      return Math.min(1.45, Math.max(0.55, scale));
    }

    function packProfileData(raw, profile, rng) {
      const heightScale = computeFormHeightScale(profile, raw.formType, raw.formSeed);
      const scaled = scaleProfileHeight(profile, heightScale);
      const bounds = profileBounds(scaled);
      return {
        profile: scaled,
        yMin: bounds.yMin,
        yRange: bounds.yRange,
        mouthR: scaled[scaled.length - 1].x,
        mouthY: scaled[scaled.length - 1].y,
        heightScale,
        formSeed: raw.formSeed,
        formType: raw.formType,
        surfaceType: raw.surfaceType,
        latheSegments: raw.latheSegments || LATHE_SEGMENTS,
        colorShift: rng(),
        dispScale: 0.78 + rng() * 0.34
      };
    }

    function silhouetteDiff(a, b) {
      let diff = 0;
      const n = Math.min(a.profile.length, b.profile.length);
      for (let i = 0; i < n; i++) {
        diff += Math.abs(a.profile[i].x - b.profile[i].x);
        diff += Math.abs(a.profile[i].y - b.profile[i].y) * 0.92;
      }
      return diff / Math.max(n, 1);
    }

    function extractFormSignature(data) {
      const n = data.profile.length;
      let maxR = 0;
      let maxIdx = 0;
      let peakCount = 0;
      for (let i = 1; i < n - 1; i++) {
        const r = data.profile[i].x;
        if (r > maxR) {
          maxR = r;
          maxIdx = i;
        }
      }
      let meanR = 0;
      for (let i = 0; i < n; i++) meanR += data.profile[i].x;
      meanR /= Math.max(n, 1);
      for (let i = 1; i < n - 1; i++) {
        const r = data.profile[i].x;
        if (r > data.profile[i - 1].x && r > data.profile[i + 1].x && r > meanR * 1.08) peakCount++;
      }
      const sig = analyzeProfileSignature(data);
      const bounds = profileBounds(data.profile);
      return {
        bellyT: maxIdx / Math.max(n - 1, 1),
        maxR,
        mouthRatio: data.mouthR / Math.max(maxR, 0.01),
        fullness: sig.fullness,
        waistR: sig.waistR,
        peakCount,
        volume: sig.volume,
        yRange: bounds.yRange,
        heightScale: data.heightScale ?? 1,
        formType: data.formType
      };
    }

    function formSignatureDistance(a, b) {
      const sa = extractFormSignature(a);
      const sb = extractFormSignature(b);
      let d = 0;
      d += Math.abs(sa.bellyT - sb.bellyT) * 2.8;
      d += Math.abs(sa.maxR - sb.maxR) / Math.max(sa.maxR, 0.08) * 1.6;
      d += Math.abs(sa.mouthRatio - sb.mouthRatio) * 1.4;
      d += Math.abs(sa.fullness - sb.fullness) / Math.max(sa.fullness, 0.5) * 1.8;
      d += Math.abs(sa.peakCount - sb.peakCount) * 0.24;
      d += Math.abs(sa.waistR - sb.waistR) / Math.max(sa.waistR, 0.05) * 1.2;
      d += Math.abs((sa.yRange ?? 1) - (sb.yRange ?? 1)) / Math.max(sa.yRange ?? 1, 0.1) * 2.4;
      d += Math.abs((sa.heightScale ?? 1) - (sb.heightScale ?? 1)) * 2.8;
      d += Math.abs(sa.volume - sb.volume) / Math.max(sa.volume, 0.02) * 0.35;
      if (sa.formType !== sb.formType) d += 0.42;
      return d;
    }

    function minHistorySignatureDiff(data, history = recentFormHistory) {
      if (!history.length) return Infinity;
      let min = Infinity;
      for (const prev of history) {
        min = Math.min(min, formSignatureDistance(data, prev));
      }
      return min;
    }

    function isSameArchetypeFamily(aType, bType) {
      if (aType === bType) return true;
      if (!aType || !bType) return false;
      if (aType.startsWith('Hybrid:') || bType.startsWith('Hybrid:')) return false;
      return false;
    }

    const CLASSIC_RADIUS_BY_TYPE = {
      MoonJar: classicMoonJarRadius,
      Maebyeong: classicMaebyeongRadius,
      WhitePorcelain: classicBaekjaRadius
    };

    function buildClassicCulturalData(archetypeId, rng, variationKey = 0) {
      const radiusFn = CLASSIC_RADIUS_BY_TYPE[archetypeId] || classicMoonJarRadius;
      const rand = rng;
      const formSeed = (Math.floor(rand() * 100000) + variationKey * 104729) | 0;
      const baseR = 0.3 + rand() * 0.24;
      const points = [];
      for (let i = 0; i < PROFILE_POINTS; i++) {
        const t = i / Math.max(PROFILE_POINTS - 1, 1);
        const y = CANONICAL_Y_MIN + t * (CANONICAL_Y_MAX - CANONICAL_Y_MIN);
        points.push(new THREE.Vector2(
          Math.max(radiusFn(t, baseR, rand, formSeed), 0.004),
          y
        ));
      }
      let profile = smoothSculpturalProfile(points, 3);
      profile = capProfileSlopes(profile, 0.004);
      profile = smoothSculpturalProfile(profile, 2);
      profile = applyProfileSeedVariation(
        profile,
        rng,
        formSeed,
        archetypeId === 'Maebyeong' ? 0.08 : archetypeId === 'MoonJar' ? 0.1 : 0.12
      );
      profile = ensureCeramicSilhouette(profile, rng, true);
      return packProfileData({
        formSeed,
        formType: archetypeId,
        surfaceType: 0,
        latheSegments: LATHE_SEGMENTS
      }, profile, rng);
    }

    function buildClassicMoonJarData(rng, variationKey = 0) {
      return buildClassicCulturalData('MoonJar', rng, variationKey);
    }

    function buildProfileDataFast(rng, forcedArchetypeId = null, variationKey = 0, contrastFrom = null) {
      const archetypeId = resolveMorphArchetypeId(forcedArchetypeId, rng) || forcedArchetypeId;
      for (let attempt = 0; attempt < FAST_MORPH_ATTEMPTS; attempt++) {
        const mixKey = variationKey + attempt * 2153 + attempt * attempt * 431;
        const useHybrid = archetypeId === '__HYBRID__' || attempt % 2 === 0;
        const raw = useHybrid
          ? generateHybridSilhouette(rng, PROFILE_POINTS, mixKey)
          : createExperimentalCeramicProfile(
            rng,
            PROFILE_POINTS,
            archetypeId,
            mixKey
          );
        let profile = smoothSculpturalProfile(resampleProfileToCanonical(raw.profile), 1);
        profile = capProfileSlopes(profile, 0.006);
        const data = packProfileData(raw, profile, rng);
        if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) continue;
        if (!passesPotterySilhouette(data)) continue;
        if (contrastFrom && isDuplicateMorphTarget(contrastFrom, data)) continue;
        return data;
      }
      const mixKey = variationKey + 73331;
      const raw = generateHybridSilhouette(rng, PROFILE_POINTS, mixKey);
      const profile = smoothSculpturalProfile(resampleProfileToCanonical(raw.profile), 1);
      return packProfileData(raw, profile, rng);
    }

    function finalizeMorphTargetData(data) {
      if (!data.processedProfile) {
        data.processedProfile = processMorphEndpointProfile(
          data.profile.map((p) => p.clone())
        );
      }
      return data;
    }

    function pickFastMorphTarget(fromData, seed, morphIndex = 0) {
      const picks = [
        '__HYBRID__',
        '__SCULPTURAL__',
        ...MORPH_ARCHETYPE_POOL
      ];
      for (let i = 0; i < FAST_MORPH_PICKS; i++) {
        const variationKey = seed + morphIndex * 13337 + i * 4817 + i * i * 613;
        const archetypeId = picks[(i + morphIndex) % picks.length];
        const data = buildProfileDataFast(
          mulberry32(variationKey),
          archetypeId,
          variationKey,
          fromData
        );
        if (validateMorphTarget(fromData, data, false)) {
          return finalizeMorphTargetData(data);
        }
      }
      const variationKey = seed + morphIndex * 77777;
      const rng = mulberry32(variationKey);
      const raw = generateHybridSilhouette(rng, PROFILE_POINTS, variationKey);
      const profile = smoothSculpturalProfile(resampleProfileToCanonical(raw.profile), 1);
      return finalizeMorphTargetData(packProfileData(raw, profile, rng));
    }

    function buildProfileData(rng, forcedArchetypeId = null, variationKey = 0, contrastFrom = null) {
      if (forcedArchetypeId === '__CLASSIC__') {
        const classicId = CLASSIC_CULTURAL_ROTATION[
          Math.abs(variationKey) % CLASSIC_CULTURAL_ROTATION.length
        ];
        return buildClassicCulturalData(classicId, rng, variationKey);
      }
      let best = null;
      let bestMetric = -Infinity;
      const attempts = contrastFrom
        ? (forcedArchetypeId === '__HYBRID__' ? 36 : 44)
        : (forcedArchetypeId === '__HYBRID__' ? 20 : 24);
      for (let attempt = 0; attempt < attempts; attempt++) {
        const mixKey = variationKey + attempt * 613 + attempt * attempt * 997;
        const raw = forcedArchetypeId === '__HYBRID__'
          ? generateHybridSilhouette(rng, PROFILE_POINTS, mixKey)
          : createExperimentalCeramicProfile(
            rng,
            PROFILE_POINTS,
            forcedArchetypeId,
            mixKey
          );
        const profile = ensureCeramicSilhouette(
          resampleProfileToCanonical(raw.profile),
          rng,
          CULTURAL_ROUND_ARCHETYPES.includes(raw.formType)
            || SCULPTURAL_ROUND_ARCHETYPES.includes(raw.formType)
        );
        const data = packProfileData(raw, profile, rng);
        const capsule = profileCapsuleScore(data.profile);
        const slender = profileSlendernessScore(data.profile);
        if (capsule > MAX_CAPSULE_SCORE) continue;
        if (slender > MAX_SLENDERNESS_SCORE) continue;
        if (profileThinGirthScore(data.profile) > MAX_THIN_GIRTH_SCORE) continue;
        if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) continue;
        if (!passesPotterySilhouette(data)) continue;
        const roundness = culturalProfileScore(data);
        const curveBeauty = profileCurveBeautyScore(data.profile);
        let metric;
        if (contrastFrom) {
          if (isDuplicateMorphTarget(contrastFrom, data)) continue;
          const sil = silhouetteDiff(contrastFrom, data);
          const hist = minHistorySilhouetteDiff(data);
          const sigFrom = formSignatureDistance(contrastFrom, data);
          const sigHist = minHistorySignatureDiff(data);
          metric = sil * 22 + hist * 12 + sigFrom * 14 + sigHist * 12
            + contrastScore(contrastFrom, data) * 3.8
            + beautyScore(data) * 0.72
            + curveBeauty * 2.2
            + roundness * 0.8;
          if (sil >= TARGET_SILHOUETTE_DIFF && validateMorphTarget(contrastFrom, data, false)) {
            best = data;
            break;
          }
        } else {
          metric = beautyScore(data) + roundness * 1.6 + curveBeauty * 2.6
            - capsule * (roundness > 0.58 ? 0.7 : 2.2)
            - slender * (curveBeauty > 0.52 ? 1.2 : 2.8);
          if (curveBeauty > 0.58 && metric > 1.4) break;
        }
        if (metric > bestMetric) {
          bestMetric = metric;
          best = data;
        }
      }
      if (best) return best;
      if (contrastFrom) {
        for (let attempt = 0; attempt < 18; attempt++) {
          const mixKey = variationKey + 620000 + attempt * 3571 + attempt * attempt * 131;
          const raw = generateHybridSilhouette(rng, PROFILE_POINTS, mixKey);
          const profile = ensureCeramicSilhouette(
            resampleProfileToCanonical(raw.profile),
            rng,
            true
          );
          const data = packProfileData(raw, profile, rng);
          if (!passesPotterySilhouette(data)) continue;
          if (!isDuplicateMorphTarget(contrastFrom, data)) return data;
        }
        return forceDistinctHybrid(contrastFrom, variationKey, variationKey >>> 0);
      }
      return buildClassicCulturalData(
        CULTURAL_ROUND_ARCHETYPES[variationKey % CULTURAL_ROUND_ARCHETYPES.length],
        rng,
        variationKey
      );
    }

    function buildEmergencyMorphTarget(fromData, seed, morphIndex = 0) {
      return pickFastMorphTarget(fromData, seed + morphIndex * 48271, morphIndex);
    }

    function forceDistinctHybrid(fromData, seed, morphIndex = 0) {
      for (let i = 0; i < 36; i++) {
        const variationKey = seed + morphIndex * 120071 + i * 15433 + i * i * 911;
        const rng = mulberry32(variationKey);
        const raw = generateHybridSilhouette(rng, PROFILE_POINTS, variationKey);
        const profile = ensureCeramicSilhouette(
          resampleProfileToCanonical(raw.profile),
          rng,
          true
        );
        const data = packProfileData(raw, profile, rng);
        if (!passesPotterySilhouette(data)) continue;
        if (silhouetteDiff(fromData, data) >= MIN_SILHOUETTE_DIFF * 0.78) return data;
      }
      return buildProfileData(
        mulberry32(seed + morphIndex * 48271 + 999983),
        '__HYBRID__',
        seed + morphIndex * 13337 + 777777,
        null
      );
    }

    function rememberForm(data) {
      recentFormHistory.push({
        profile: data.profile.map((p) => p.clone()),
        formType: data.formType,
        formSeed: data.formSeed,
        mouthR: data.mouthR,
        mouthY: data.mouthY,
        yMin: data.yMin,
        yRange: data.yRange,
        heightScale: data.heightScale ?? 1,
        colorShift: data.colorShift,
        surfaceType: data.surfaceType
      });
      if (recentFormHistory.length > RECENT_FORM_LIMIT) recentFormHistory.shift();
      recentArchetypeHistory.push(data.formType);
      if (recentArchetypeHistory.length > RECENT_ARCHETYPE_BLOCK + 2) {
        recentArchetypeHistory.shift();
      }
    }

    function isDuplicateMorphTarget(fromData, data) {
      if (!fromData || !data) return true;
      const sil = silhouetteDiff(fromData, data);
      const sigFrom = formSignatureDistance(fromData, data);
      if (sil < MIN_SILHOUETTE_DIFF * 0.9) return true;
      if (sigFrom < MIN_SIGNATURE_FROM_PREV * 0.86) return true;
      if (minHistorySilhouetteDiff(data) < MIN_HISTORY_DIFF * 0.86) return true;
      if (minHistorySignatureDiff(data) < MIN_SIGNATURE_HISTORY * 0.86) return true;
      for (const prev of recentFormHistory) {
        if (Math.abs((prev.formSeed ?? 0) - (data.formSeed ?? 0)) < 96) return true;
        if (silhouetteDiff(prev, data) < MIN_HISTORY_DIFF * 0.88) return true;
        if (formSignatureDistance(prev, data) < MIN_SIGNATURE_HISTORY * 0.88) return true;
      }
      return false;
    }

    function validateMorphTarget(fromData, data, strict = true) {
      if (!data || !passesPotterySilhouette(data)) return false;
      if (isDuplicateMorphTarget(fromData, data)) return false;
      return passesNoveltyGate(fromData, data, strict);
    }

    function minHistorySilhouetteDiff(data, history = recentFormHistory) {
      if (!history.length) return Infinity;
      let min = Infinity;
      for (const prev of history) {
        min = Math.min(min, silhouetteDiff(data, prev));
      }
      return min;
    }

    function profileDataFromSeed(seed) {
      return buildProfileData(mulberry32(seed), null, seed);
    }

    function profileDataForArchetype(archetypeId, seed) {
      let best = null;
      let bestSil = -1;
      for (let i = 0; i < 40; i++) {
        const data = buildProfileData(mulberry32(seed + i * 4817), archetypeId);
        if (!best || data.formSeed > best.formSeed) {
          best = data;
          bestSil = i;
        }
      }
      return best;
    }

    function shuffledArchetypeCandidates(fromType, seed) {
      const rng = mulberry32(seed ^ 0x9e3779b9);
      const blocked = new Set([fromType]);
      for (const id of recentArchetypeHistory.slice(-RECENT_ARCHETYPE_BLOCK)) blocked.add(id);
      let cultural = CULTURAL_ROUND_ARCHETYPES.filter((id) => !blocked.has(id));
      let sculptural = SCULPTURAL_ROUND_ARCHETYPES.filter((id) => !blocked.has(id));
      if (cultural.length < 2) {
        cultural = CULTURAL_ROUND_ARCHETYPES.filter((id) => id !== fromType);
      }
      if (sculptural.length < 2) {
        sculptural = SCULPTURAL_ROUND_ARCHETYPES.filter((id) => id !== fromType);
      }
      const sculptSample = sculptural.slice(0, 6);
      let list = [
        '__HYBRID__',
        '__SCULPTURAL__',
        '__HYBRID__',
        ...cultural,
        ...sculptSample.filter((id) => !cultural.includes(id))
      ];
      if ((seed >>> 0) % 11 === 0) list.push('__CLASSIC__');
      if (list.length < 6) list.push('__SCULPTURAL__');
      if (list.length < 7) list.push('__HYBRID__');
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function passesNoveltyGate(fromData, data, strict = true) {
      const sil = silhouetteDiff(fromData, data);
      const hist = minHistorySilhouetteDiff(data);
      const sigFrom = formSignatureDistance(fromData, data);
      const sigHist = minHistorySignatureDiff(data);
      if (strict) {
        return sil >= MIN_SILHOUETTE_DIFF
          && hist >= MIN_HISTORY_DIFF
          && sigFrom >= MIN_SIGNATURE_FROM_PREV
          && sigHist >= MIN_SIGNATURE_HISTORY;
      }
      return sil >= MIN_SILHOUETTE_DIFF * 0.86
        && hist >= MIN_HISTORY_DIFF * 0.86
        && sigFrom >= MIN_SIGNATURE_FROM_PREV * 0.82
        && sigHist >= MIN_SIGNATURE_HISTORY * 0.82;
    }

    function createContrastingSearch(fromData, seed, morphIndex = 0) {
      return {
        fromData,
        seed,
        morphIndex,
        preferClassic: morphIndex % CLASSIC_MOJAR_INTERVAL === 0,
        classicTried: false,
        candidates: shuffledArchetypeCandidates(fromData.formType, seed + morphIndex * 1543),
        c: 0,
        i: 0,
        fallbackI: 0,
        bestContrast: null,
        bestContrastSil: -1,
        bestContrastMetric: -Infinity,
        phase: 'main',
        best: null,
        bestMetric: -1,
        bestRelaxed: null,
        bestRelaxedMetric: -1,
        done: false,
        result: null
      };
    }

    function stepContrastingSearch(state) {
      if (state.done) return state;

      if (state.preferClassic && !state.classicTried) {
        state.classicTried = true;
        const classicId = CLASSIC_CULTURAL_ROTATION[state.morphIndex % CLASSIC_CULTURAL_ROTATION.length];
        const classic = buildClassicCulturalData(
          classicId,
          mulberry32(state.seed + state.morphIndex * 31817 + 48271),
          state.seed + state.morphIndex * 13337
        );
        if (culturalProfileScore(classic) >= 0.48
          && profileSpikiness(classic.profile) <= MAX_PROFILE_SPIKINESS
          && validateMorphTarget(state.fromData, classic, false)) {
          state.result = classic;
          state.done = true;
          return state;
        }
      }

      if (state.phase === 'main') {
        if (state.c >= state.candidates.length) {
          if (state.bestContrast && validateMorphTarget(state.fromData, state.bestContrast, false)) {
            state.result = state.bestContrast;
            state.done = true;
            return state;
          }
          if (state.best && validateMorphTarget(state.fromData, state.best, false)) {
            state.result = state.best;
            state.done = true;
            return state;
          }
          if (state.bestRelaxed && validateMorphTarget(state.fromData, state.bestRelaxed, false)) {
            state.result = state.bestRelaxed;
            state.done = true;
            return state;
          }
          state.phase = 'fallback';
          return state;
        }

        const archetypeId = state.candidates[state.c];
        if (state.i >= MORPH_PICK_ATTEMPTS) {
          state.c++;
          state.i = 0;
          return state;
        }

        const variationKey = state.seed + state.c * 5923 + state.i * 7919 + state.morphIndex * 13337;
        const data = buildProfileData(
          mulberry32(variationKey),
          archetypeId,
          variationKey,
          state.fromData
        );
        state.i++;

        if (profileSpikiness(data.profile) > MAX_PROFILE_SPIKINESS) return state;
        if (!passesPotterySilhouette(data)) return state;
        if (isDuplicateMorphTarget(state.fromData, data)) return state;

        const sil = silhouetteDiff(state.fromData, data);
        const hist = minHistorySilhouetteDiff(data);
        const sigFrom = formSignatureDistance(state.fromData, data);
        const sigHist = minHistorySignatureDiff(data);
        const contrast = contrastScore(state.fromData, data);
        const roundness = culturalProfileScore(data);
        const curveBeauty = profileCurveBeautyScore(data.profile);
        const capsulePenalty = roundness > 0.58 ? 1.2 : 4.2;
        const slenderPenalty = curveBeauty > 0.52 ? 3.5 : 6.5;
        const thinPenalty = curveBeauty > 0.52 ? 4.5 : 9.5;
        const culturalBonus = CULTURAL_ROUND_ARCHETYPES.includes(data.formType) ? 3.2 : 0;
        const sculpturalBonus = isSculpturalPotteryType(data.formType) ? 5.4 : 0;
        const typeJump = data.formType !== state.fromData.formType ? 8.5 : 0;
        const silBonus = Math.max(0, sil - MIN_SILHOUETTE_DIFF) * 52;
        const contrastBonus = Math.max(0, contrast - 2.8) * 4.2;
        const heightDiff = Math.abs((data.yRange ?? 1) - (state.fromData.yRange ?? 1))
          / Math.max(state.fromData.yRange ?? 1, 0.1);
        const heightBonus = heightDiff > 0.08 ? heightDiff * 14 : 0;
        const metric = sil * 42 + hist * 14 + sigFrom * 14 + sigHist * 12 + contrast * 4.6
          + silBonus + contrastBonus + typeJump + heightBonus
          + beautyScore(data) * 1.45
          + curveBeauty * 14
          + roundness * 9
          + culturalBonus
          + sculpturalBonus
          - profilePotteryDeparturePenalty(data.profile) * 5
          - profileBoxinessScore(data.profile) * 12
          - profileShoulderCornerPenalty(data.profile) * 4.5
          - profileCapsuleScore(data.profile) * capsulePenalty
          - profileSlendernessScore(data.profile) * slenderPenalty
          - profileThinGirthScore(data.profile) * thinPenalty;

        if (passesNoveltyGate(state.fromData, data, false) && metric > state.bestRelaxedMetric) {
          state.bestRelaxedMetric = metric;
          state.bestRelaxed = data;
        }

        if (sil > state.bestContrastSil && validateMorphTarget(state.fromData, data, false)) {
          state.bestContrastSil = sil;
          state.bestContrast = data;
          state.bestContrastMetric = metric;
        }

        if (!passesNoveltyGate(state.fromData, data, true)) return state;

        if (metric > state.bestMetric) {
          state.bestMetric = metric;
          state.best = data;
        }

        if (validateMorphTarget(state.fromData, data, true)) {
          state.result = data;
          state.done = true;
        }
        return state;
      }

      if (state.fallbackI < 128) {
        const variationKey = state.seed + state.morphIndex * 99991 + state.fallbackI * 31817;
        state.fallbackI++;
        const archetypeId = state.fallbackI % 4 === 0
          ? '__CLASSIC__'
          : state.fallbackI % 5 === 0
            ? '__SCULPTURAL__'
            : state.fallbackI % 6 === 0
              ? '__HYBRID__'
              : MORPH_ARCHETYPE_POOL[state.fallbackI % MORPH_ARCHETYPE_POOL.length];
        const data = buildProfileData(
          mulberry32(variationKey),
          archetypeId,
          variationKey,
          state.fromData
        );
        if (validateMorphTarget(state.fromData, data, false)) {
          state.result = data;
          state.done = true;
        }
        return state;
      }

      state.result = buildEmergencyMorphTarget(
        state.fromData,
        state.seed + state.morphIndex * 99991,
        state.morphIndex
      );
      state.done = true;
      return state;
    }

    function finishContrastingSearch(state) {
      while (!state.done) stepContrastingSearch(state);
      if (!state.result || !validateMorphTarget(state.fromData, state.result, false)) {
        state.result = buildEmergencyMorphTarget(
          state.fromData,
          state.seed + state.morphIndex * 48271,
          state.morphIndex
        );
      }
      return state.result;
    }

    function profileDataContrasting(fromData, seed, morphIndex = 0) {
      return finishContrastingSearch(createContrastingSearch(fromData, seed, morphIndex));
    }

    function pickQuickMorphTarget(fromData, seed, morphIndex = 0) {
      return pickFastMorphTarget(fromData, seed, morphIndex);
    }

    function smoothMorphT(t) {
      return t * t * (3 - 2 * t);
    }

    function lerpProfileData(a, b, t) {
      const ease = smoothMorphT(t);
      const n = Math.min(a.profile.length, b.profile.length);
      const profile = [];
      for (let i = 0; i < n; i++) {
        profile.push(new THREE.Vector2(
          a.profile[i].x + (b.profile[i].x - a.profile[i].x) * ease,
          a.profile[i].y + (b.profile[i].y - a.profile[i].y) * ease
        ));
      }
      return {
        profile,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: a.mouthR + (b.mouthR - a.mouthR) * ease,
        mouthY: a.mouthY + (b.mouthY - a.mouthY) * ease,
        formSeed: a.formSeed + (b.formSeed - a.formSeed) * ease,
        surfaceType: a.surfaceType + (b.surfaceType - a.surfaceType) * ease,
        latheSegments: LATHE_SEGMENTS,
        colorShift: a.colorShift + (b.colorShift - a.colorShift) * ease,
        dispScale: a.dispScale + (b.dispScale - a.dispScale) * ease
      };
    }

    function applyColorsFromShift(uniforms, colorShift = 0.5) {
      const tint = (colorShift - 0.5) * 0.028;
      uniforms.uColorDeep.value.setRGB(
        0.048 + tint * 0.12,
        0.19 + tint * 0.22,
        0.28 - tint * 0.08
      );
      uniforms.uColorMid.value.setRGB(
        0.1 + tint * 0.1,
        0.34 + tint * 0.28,
        0.46 - tint * 0.06
      );
      uniforms.uColorLight.value.setRGB(
        0.28 + tint * 0.08,
        0.56 + tint * 0.16,
        0.72 - tint * 0.04
      );
    }

    function lockJarColors(jar, colorShift = 0.5) {
      applyColorsFromShift(jar.outerUniforms, colorShift);
      applyColorsFromShift(jar.innerUniforms, colorShift);
      snapshotJarColorsToPrev(jar);
      jar.outerUniforms.uColorMorphT.value = 1;
      jar.innerUniforms.uColorMorphT.value = 1;
      jar.activeColorShift = colorShift;
    }

    function snapshotColorsToPrev(uniforms) {
      uniforms.uColorDeepPrev.value.copy(uniforms.uColorDeep.value);
      uniforms.uColorMidPrev.value.copy(uniforms.uColorMid.value);
      uniforms.uColorLightPrev.value.copy(uniforms.uColorLight.value);
    }

    function snapshotJarColorsToPrev(jar) {
      jar.outerUniforms.uColorDeepPrev.value.copy(jar.outerUniforms.uColorDeep.value);
      jar.outerUniforms.uColorMidPrev.value.copy(jar.outerUniforms.uColorMid.value);
      jar.outerUniforms.uColorLightPrev.value.copy(jar.outerUniforms.uColorLight.value);
      jar.innerUniforms.uColorDeepPrev.value.copy(jar.innerUniforms.uColorDeep.value);
      jar.innerUniforms.uColorMidPrev.value.copy(jar.innerUniforms.uColorMid.value);
      jar.innerUniforms.uColorLightPrev.value.copy(jar.innerUniforms.uColorLight.value);
    }

    function beginColorMorph(jar, colorShift = 0.5) {
      lockJarColors(jar, jar.activeColorShift ?? colorShift);
    }

    function setColorMorphProgress(jar, t) {
      jar.outerUniforms.uColorMorphT.value = 1;
      jar.innerUniforms.uColorMorphT.value = 1;
    }

    function finishColorMorph(jar, colorShift = 0.5) {
      lockJarColors(jar, jar.activeColorShift ?? colorShift);
      jar.meniscus.material.color.copy(CELADON_HIGHLIGHT);
    }

    function applyGeometryUniforms(jar, data) {
      jar.outerUniforms.uJarYMin.value = data.yMin;
      jar.outerUniforms.uJarYRange.value = data.yRange;
      jar.outerUniforms.uDispScale.value = data.dispScale;
      jar.innerUniforms.uJarYMin.value = data.yMin;
      jar.innerUniforms.uJarYRange.value = data.yRange;
      jar.innerUniforms.uDispScale.value = data.dispScale * 0.32;
    }

    function applyShapeUniforms(jar, data) {
      applyGeometryUniforms(jar, data);
    }

    function midColorFromShift(colorShift = 0.5, target = new THREE.Color()) {
      const tint = (colorShift - 0.5) * 0.03;
      return target.setRGB(0.12 + tint * 0.28, 0.32 + tint * 0.72, 0.46 - tint * 0.18);
    }

    function idleBecomingValue(elapsed) {
      return 0.16 + Math.sin(elapsed * 0.38) * 0.025;
    }

    function applyAppearanceLerp(jar, fromData, toData, ease, startBecoming = 0.16) {
      jar.outerUniforms.uJarYMin.value = fromData.yMin;
      jar.outerUniforms.uJarYRange.value = fromData.yRange;
      jar.innerUniforms.uJarYMin.value = fromData.yMin;
      jar.innerUniforms.uJarYRange.value = fromData.yRange;
      jar.outerUniforms.uDispScale.value = fromData.dispScale;
      jar.innerUniforms.uDispScale.value = fromData.dispScale * 0.32;

      const targetBecoming = 0.15 + ease * 0.12;
      jar.outerUniforms.uBecoming.value = startBecoming + (targetBecoming - startBecoming) * ease;
      jar.innerUniforms.uBecoming.value = jar.outerUniforms.uBecoming.value;
    }

    function setMorphingState(jar, active) {
      const value = active ? 1 : 0;
      jar.outerUniforms.uMorphing.value = value;
      jar.innerUniforms.uMorphing.value = value;
    }

    function beautyScore(data) {
      const sig = analyzeProfileSignature(data);
      const curveBeauty = profileCurveBeautyScore(data.profile);
      let score = 0;

      score += curveBeauty * 3.1;

      if (sig.fullness >= 1.05 && sig.fullness <= 4.2) score += 0.85;
      else score -= Math.abs(sig.fullness - 2.1) * 0.16;

      let inflect = 0;
      for (let i = 2; i < data.profile.length; i++) {
        const d1 = data.profile[i].x - data.profile[i - 1].x;
        const d0 = data.profile[i - 1].x - data.profile[i - 2].x;
        inflect += Math.abs(d1 - d0);
      }
      inflect /= Math.max(data.profile.length - 2, 1);
      if (inflect >= 0.008 && inflect <= 0.11) score += 0.85;
      else score += Math.max(0, 0.5 - Math.abs(inflect - 0.038) * 3.2);

      const aspect = sig.maxR / Math.max(data.yRange, 0.1);
      score += 0.95 - Math.min(0.95, Math.abs(aspect - 0.88) / 0.62);

      score -= profilePotteryDeparturePenalty(data.profile) * 1.35;
      score -= profileBoxinessScore(data.profile) * 2.8;
      score -= profileShoulderCornerPenalty(data.profile) * 1.2;
      score -= profileTrapezoidBasePenalty(data.profile) * 1.0;

      const mouthRatio = sig.mouthR / Math.max(sig.maxR, 0.01);
      if (mouthRatio >= 0.18 && mouthRatio <= 0.54) score += 0.55;
      else if (mouthRatio < 0.16 || mouthRatio > 0.62) score -= 0.4;

      const baseRatio = sig.minR / Math.max(sig.maxR, 0.01);
      if (baseRatio >= 0.12 && baseRatio <= 0.54) score += 0.45;
      else if (baseRatio < 0.1) score -= 0.5;

      if (sig.maxR >= 0.3 && sig.maxR <= 1.05) score += 0.45;
      else if (sig.maxR < 0.26) score -= 0.4;

      score += culturalProfileScore(data) * 2.05;
      score += profileMoonJarScore(data.profile) * 0.5;
      score += profileMaebyeongScore(data.profile) * 0.42;
      score += profileBaekjaScore(data.profile) * 0.38;
      score -= profileCapsuleScore(data.profile) * (curveBeauty > 0.5 ? 0.55 : 2.0);

      const slenderPenalty = curveBeauty > 0.55 ? 1.1 : 2.6;
      const thinPenalty = curveBeauty > 0.55 ? 1.2 : 2.8;
      score -= profileSlendernessScore(data.profile) * slenderPenalty;
      score -= profileThinGirthScore(data.profile) * thinPenalty;

      const footR = data.profile[Math.floor(data.profile.length * 0.04)].x;
      const footRatio = footR / Math.max(sig.maxR, 0.01);
      if (footRatio >= 0.14 && footRatio <= 0.3) score += 0.48;
      else if (footRatio >= 0.1 && footRatio <= 0.36) score += 0.24;

      const neckR = data.profile[Math.floor(data.profile.length * 0.92)].x;
      const neckRatio = neckR / Math.max(sig.maxR, 0.01);
      if (neckRatio <= 0.78) score += 0.52;
      else score -= (neckRatio - 0.78) * 1.2;

      return score;
    }

    function analyzeProfileSignature(data) {
      let maxR = 0;
      let minR = Infinity;
      let waistR = Infinity;
      let volume = 0;
      const midStart = Math.floor(data.profile.length * 0.2);
      const midEnd = Math.floor(data.profile.length * 0.8);
      for (let i = 0; i < data.profile.length; i++) {
        const r = data.profile[i].x;
        maxR = Math.max(maxR, r);
        if (r > 0.01) minR = Math.min(minR, r);
        if (i >= midStart && i <= midEnd) waistR = Math.min(waistR, r);
        volume += r * r;
      }
      return {
        maxR,
        minR: minR === Infinity ? 0.01 : minR,
        mouthR: data.mouthR,
        waistR: waistR === Infinity ? maxR : waistR,
        fullness: maxR / Math.max(waistR, 0.01),
        volume,
        surfaceType: data.surfaceType,
        colorShift: data.colorShift
      };
    }

    function contrastScore(fromData, candidate) {
      const a = analyzeProfileSignature(fromData);
      const b = analyzeProfileSignature(candidate);
      const rDiff = Math.abs(b.maxR - a.maxR) / Math.max(a.maxR, 0.08);
      const mouthDiff = Math.abs(b.mouthR - a.mouthR) / Math.max(a.mouthR, 0.08);
      const waistDiff = Math.abs(b.waistR - a.waistR) / Math.max(a.waistR, 0.05);
      const fullnessDiff = Math.abs(b.fullness - a.fullness) / Math.max(a.fullness, 0.5);
      const volumeDiff = Math.abs(b.volume - a.volume) / Math.max(a.volume, 0.02);
      let silhouetteDiff = 0;
      for (let i = 0; i < fromData.profile.length; i++) {
        silhouetteDiff += Math.abs(fromData.profile[i].x - candidate.profile[i].x);
        silhouetteDiff += Math.abs(fromData.profile[i].y - candidate.profile[i].y) * 0.9;
      }
      silhouetteDiff /= fromData.profile.length;
      const surfaceBonus = candidate.surfaceType !== fromData.surfaceType ? 0.75 : 0;
      const typeBonus = candidate.formType && fromData.formType && candidate.formType !== fromData.formType ? 8.5 : -1.2;
      const colorBonus = Math.abs(candidate.colorShift - fromData.colorShift) * 2.6;
      const heightDiff = Math.abs((candidate.yRange ?? 1) - (fromData.yRange ?? 1))
        / Math.max(fromData.yRange ?? 1, 0.1);
      const scaleDiff = Math.abs((candidate.heightScale ?? 1) - (fromData.heightScale ?? 1));

          const j0 = Math.max(0, j - 1);
          const j1 = Math.min(profileLen - 1, j + 1);
          const dr = profile[j1].x - profile[j0].x;
          const dy = profile[j1].y - profile[j0].y;
          const ds = Math.max(Math.hypot(dr, dy), 1e-5);
          const nr = -dy / ds;
          const ny = dr / ds;
          const idx = (i * profileLen + j) * 3;
          const nx = nr * sinP;
          const nz = nr * cosP;
          const len = Math.hypot(nx, ny, nz) || 1;
          narr[idx] = nx / len;
          narr[idx + 1] = ny / len;
          narr[idx + 2] = nz / len;
        }
      }
      norm.needsUpdate = true;
    }

    function updateInnerProfileInPlace(outerProfile, innerOut, wall = 0.022) {
      const n = outerProfile.length;
      while (innerOut.length < n) innerOut.push(new THREE.Vector2());
      for (let i = 0; i < n; i++) {
        const p = outerProfile[i];
        innerOut[i].x = Math.max(p.x - wall, 0.012);
        innerOut[i].y = p.y;
      }
      innerOut.length = n;
      return innerOut;
    }

    function applyProfileGeometryToJar(jar, geo, innerScratch = null, options = {}) {
      const { skipInner = true } = options;
      const segments = jar.latheSegments;

      if (!updateLatheGeometryInPlace(jar.outer.geometry, geo.profile, segments, options)) {
        const outerGeo = finalizeLatheGeometry(
          new THREE.LatheGeometry(geo.profile, segments),
          segments,
          geo.profile.length
        );
        jar.outer.geometry.dispose();
        jar.outer.geometry = outerGeo;
      }

      if (!skipInner) {
        const innerSegments = jar.innerSegments;
        const innerProfile = innerScratch
          ? updateInnerProfileInPlace(geo.profile, innerScratch)
          : createInnerProfile(geo.profile);
        if (!updateLatheGeometryInPlace(jar.inner.geometry, innerProfile, innerSegments)) {
          const innerGeo = new THREE.LatheGeometry(innerProfile, innerSegments);
          innerGeo.computeVertexNormals();
          jar.inner.geometry.dispose();
          jar.inner.geometry = innerGeo;
        }
      }

      const mouthScale = geo.mouthR / jar.baseMouthR;
      jar.meniscus.position.y = geo.mouthY;
      jar.meniscus.scale.set(mouthScale * 0.82, mouthScale * 0.82, 1);
    }

    function applyMorphUniforms(jar, data) {
      applyGeometryUniforms(jar, data);
      lockJarColors(jar, jar.activeColorShift ?? 0.5);
    }

    function applyProfileToJar(jar, data) {
      applyProfileGeometryToJar(jar, data);
      applyMorphUniforms(jar, data);
    }

    function buildMorphingJar(initialData) {
      const group = new THREE.Group();
      group.position.set(0, 0, 0);
      group.rotation.y = Math.PI / LATHE_SEGMENTS;
      group.scale.setScalar(JAR_DISPLAY_SCALE);

      const outerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      outerUniforms.uDispScale.value = initialData.dispScale;
      outerUniforms.uAppear.value = 0;

      const outerGeo = finalizeLatheGeometry(
        new THREE.LatheGeometry(initialData.profile, LATHE_SEGMENTS),
        LATHE_SEGMENTS,
        initialData.profile.length
      );
      const outer = new THREE.Mesh(outerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: outerUniforms,
        transparent: true,
        side: THREE.FrontSide,
        depthWrite: false
      }));
      group.add(outer);
      outer.renderOrder = 1;

      const innerUniforms = cloneJarUniforms(
        initialData.yMin, initialData.yRange,
        initialData.formSeed, initialData.surfaceType
      );
      innerUniforms.uInterior.value = 1;
      innerUniforms.uDispScale.value = initialData.dispScale * 0.32;
      innerUniforms.uAppear.value = 0;
      innerUniforms.uTime = outerUniforms.uTime;

      const innerGeo = new THREE.LatheGeometry(createInnerProfile(initialData.profile), LATHE_SEGMENTS - 16);
      innerGeo.computeVertexNormals();
      const inner = new THREE.Mesh(innerGeo, new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: innerUniforms,
        transparent: true,
        side: THREE.BackSide,
        depthWrite: false
      }));
      inner.visible = false;
      group.add(inner);

      const meniscus = new THREE.Mesh(
        new THREE.CircleGeometry(initialData.mouthR * 0.82, 28),
        new THREE.MeshBasicMaterial({
          color: 0xeaf6fc,
          transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false
        })
      );
      meniscus.rotation.x = -Math.PI / 2;
      meniscus.position.set(0, initialData.mouthY, 0);
      group.add(meniscus);

      fieldGroup.add(group);

      const jar = {
        group,
        outer,
        inner,
        meniscus,
        outerUniforms,
        innerUniforms,
        latheSegments: LATHE_SEGMENTS,
        innerSegments: Math.max(48, LATHE_SEGMENTS - 16),
        baseMouthR: initialData.mouthR,
        timeOffset: initialData.formSeed * 0.01,
        activeColorShift: 0.5
      };
      lockJarColors(jar, 0.5);
      return jar;
    }

    function easeSineOut(t) {
      return Math.sin(t * Math.PI * 0.5);
    }

    function easeSineInOut(t) {
      return -(Math.cos(Math.PI * t) - 1) * 0.5;
    }

    let birthState = null;

    function runWaterBirth(jar, targetData, onComplete) {
      lockJarColors(jar, 0.5);
      applyGeometryUniforms(jar, targetData);
      jar.outerUniforms.uBirthActive.value = 0;
      jar.innerUniforms.uBirthActive.value = 0;
      jar.outerUniforms.uBirthProgress.value = 0;
      jar.innerUniforms.uBirthProgress.value = 0;
      jar.outerUniforms.uBecoming.value = 0.22;
      jar.innerUniforms.uBecoming.value = 0.22;
      applyProfileGeometryToJar(jar, targetData);
      birthState = {
        jar,
        targetData,
        startTime: performance.now(),
        duration: BIRTH_DURATION * 1000,
        onComplete
      };
      setMorphingState(jar, false);
    }

    function updateBirthAnimation(now) {
      if (!birthState) return;
      const { jar, targetData, startTime, duration, onComplete } = birthState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const t = easeSineOut(rawT);

      jar.outerUniforms.uBirthProgress.value = t;
      jar.innerUniforms.uBirthProgress.value = t;
      jar.outerUniforms.uBecoming.value = 0.18 + t * 0.08;
      jar.innerUniforms.uBecoming.value = jar.outerUniforms.uBecoming.value;
      jar.outerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.innerUniforms.uAppear.value = Math.min(1, t * 1.05);
      jar.meniscus.material.opacity = Math.min(0.2, Math.max(0, (t - 0.85) * 1.4));
      jar.meniscus.material.color.lerpColors(
        midColorFromShift(targetData.colorShift),
        CELADON_HIGHLIGHT,
        Math.min(1, t * 0.72)
      );

      if (rawT >= 1) {
        const settled = processMorphEndpointProfile(targetData.profile);
        applyProfileGeometryToJar(jar, {
          ...targetData,
          profile: settled,
          mouthR: targetData.mouthR,
          mouthY: targetData.mouthY
        });
        applyGeometryUniforms(jar, targetData);
        currentForm = {
          ...targetData,
          profile: settled.map((p) => p.clone()),
          mouthR: settled[settled.length - 1].x,
          mouthY: settled[settled.length - 1].y,
          yMin: profileBounds(settled).yMin,
          yRange: profileBounds(settled).yRange
        };
        lockJarColors(jar, 0.5);
        jar.outerUniforms.uAppear.value = 1;
        jar.innerUniforms.uAppear.value = 1;
        jar.meniscus.material.opacity = 0.2;
        jar.meniscus.material.color.copy(CELADON_HIGHLIGHT);
        jar.outerUniforms.uBirthActive.value = 0;
        jar.innerUniforms.uBirthActive.value = 0;
        jar.outerUniforms.uBirthProgress.value = 1;
        jar.innerUniforms.uBirthProgress.value = 1;
        setMorphingState(jar, false);
        birthState = null;
        if (onComplete) onComplete();
      }
    }

    let morphJar = null;
    let morphSeed = Math.floor(Math.random() * 999999);
    let morphGen = 0;
    let currentForm = null;
    let morphState = null;
    let morphTimer = null;
    const morphPrefetch = { target: null, gen: -1, busy: false };
    const morphScratch = {
      profile: [],
      inner: [],
      geo: {
        profile: null,
        yMin: CANONICAL_Y_MIN,
        yRange: CANONICAL_Y_MAX - CANONICAL_Y_MIN,
        mouthR: 0,
        mouthY: 0
      }
    };

    function prefetchNextMorph() {
      if (!currentForm) return;
      const nextGen = morphGen + 1;
      if (morphPrefetch.target && morphPrefetch.gen === nextGen) return;
      if (morphPrefetch.busy) return;

      morphPrefetch.busy = true;
      morphPrefetch.target = pickFastMorphTarget(
        currentForm,
        morphSeed + nextGen * 7919,
        nextGen
      );
      morphPrefetch.gen = nextGen;
      morphPrefetch.busy = false;
    }

    function resolveMorphTarget(pendingGen) {
      if (morphPrefetch.target && morphPrefetch.gen === pendingGen) {
        const target = morphPrefetch.target;
        morphPrefetch.target = null;
        morphPrefetch.gen = -1;
        return target;
      }
      return pickFastMorphTarget(
        currentForm,
        morphSeed + pendingGen * 7919,
        pendingGen
      );
    }

    function processMorphEndpointProfile(profile) {
      const out = profile.map((p) => p.clone());
      capProfileSlopes(out, 0.005);
      const footFixed = normalizeCeramicFoot(out);
      for (let i = 0; i < out.length; i++) {
        out[i].x = footFixed[i].x;
        out[i].y = footFixed[i].y;
      }
      const relaxed = relaxBoxyWalls(out);
      for (let i = 0; i < relaxed.length; i++) {
        out[i].x = relaxed[i].x;
        out[i].y = relaxed[i].y;
      }
      const waistFixed = softenWaistPinch(out, 0.72);
      return smoothSculpturalProfile(waistFixed, 1);
    }

    function lerpProcessedProfiles(fromPts, toPts, ease, out) {
      const n = Math.min(fromPts.length, toPts.length);
      while (out.length < n) out.push(new THREE.Vector2());
      for (let i = 0; i < n; i++) {
        out[i].x = fromPts[i].x + (toPts[i].x - fromPts[i].x) * ease;
        out[i].y = fromPts[i].y + (toPts[i].y - fromPts[i].y) * ease;
      }
      out.length = n;
      capProfileSlopes(out, 0.004);
      return out;
    }

    function lerpProfileInto(fromData, toData, t, out, fromPts, toPts) {
      const ease = t;
      lerpProcessedProfiles(fromPts, toPts, ease, out);
      const bounds = profileBounds(out);
      morphScratch.geo.profile = out;
      morphScratch.geo.yMin = bounds.yMin;
      morphScratch.geo.yRange = bounds.yRange;
      morphScratch.geo.mouthR = out[out.length - 1].x;
      morphScratch.geo.mouthY = out[out.length - 1].y;
      return morphScratch.geo;
    }

    function updateMorphAnimation(now) {
      if (!morphState) return;
      const { from, to, fromProfile, toProfile, startTime, duration } = morphState;
      const rawT = Math.min(1, (now - startTime) / duration);
      const ease = easeSineInOut(rawT);
      const geoDue = rawT >= 1
        || perf.lastGeoUpdate === 0
        || now - perf.lastGeoUpdate >= perf.geoInterval;

      lerpProfileInto(from, to, ease, morphScratch.profile, fromProfile, toProfile);
      if (geoDue) {
        applyProfileGeometryToJar(morphJar, morphScratch.geo, morphScratch.inner, {
          skipInner: true,
          smoothNormals: 0.5
        });
        perf.lastGeoUpdate = now;
      }
      if (rawT > 0.42 && !morphState.prefetchQueued) {
        morphState.prefetchQueued = true;
        prefetchNextMorph();
      }

      applyAppearanceLerp(morphJar, from, to, ease, morphState.startBecoming);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;

      if (rawT >= 1) {
        lerpProfileInto(from, to, 1, morphScratch.profile, fromProfile, toProfile);
        applyProfileGeometryToJar(morphJar, morphScratch.geo, morphScratch.inner, { skipInner: true });
        currentForm = {
          ...to,
          profile: morphScratch.profile.map((p) => p.clone()),
          mouthR: morphScratch.profile[morphScratch.profile.length - 1].x,
          mouthY: morphScratch.profile[morphScratch.profile.length - 1].y,
          yMin: morphScratch.geo.yMin,
          yRange: morphScratch.geo.yRange
        };
        applyGeometryUniforms(morphJar, currentForm);
        delete morphJar.outer.geometry.userData.prevNormalArray;
        setMorphingState(morphJar, false);
        morphJar.outerUniforms.uBirthActive.value = 0;
        morphJar.innerUniforms.uBirthActive.value = 0;
        morphJar.outerUniforms.uBirthProgress.value = 1;
        morphJar.innerUniforms.uBirthProgress.value = 1;
        morphState = null;
        rememberForm(currentForm);
        morphTimer = setTimeout(scheduleNextMorph, HOLD_DURATION * 1000);
        prefetchNextMorph();
      }
    }

    function scheduleNextMorph() {
      if (morphTimer) clearTimeout(morphTimer);
      if (morphState || birthState) return;
      const pendingGen = morphGen + 1;

      if (!morphPrefetch.target || morphPrefetch.gen !== pendingGen) {
        prefetchNextMorph();
      }

      morphGen = pendingGen;
      const targetForm = resolveMorphTarget(pendingGen);
      const fromProfile = currentForm.profile.map((p) => p.clone());
      const toProfile = targetForm.processedProfile
        || processMorphEndpointProfile(targetForm.profile.map((p) => p.clone()));
      beginColorMorph(morphJar, morphJar.activeColorShift ?? 0.5);
      delete morphJar.outer.geometry.userData.prevNormalArray;
      setMorphingState(morphJar, true);
      morphJar.outerUniforms.uBirthActive.value = 0;
      morphJar.innerUniforms.uBirthActive.value = 0;
      morphJar.outerUniforms.uBirthProgress.value = 1;
      morphJar.innerUniforms.uBirthProgress.value = 1;
      perf.lastGeoUpdate = 0;
      morphState = {
        from: currentForm,
        to: targetForm,
        fromProfile,
        toProfile,
        startTime: performance.now(),
        duration: MORPH_DURATION * 1000,
        startBecoming: morphJar.outerUniforms.uBecoming.value,
        prefetchQueued: false
      };
      prefetchNextMorph();
    }

    function initMorphingJar() {
      morphSeed = Math.floor(Math.random() * 999999);
      morphGen = 1;
      recentFormHistory = [];
      recentArchetypeHistory = [];
      const startArchetype = CULTURAL_ROUND_ARCHETYPES[
        Math.floor(Math.random() * CULTURAL_ROUND_ARCHETYPES.length)
      ];
      currentForm = buildClassicCulturalData(
        startArchetype,
        mulberry32(morphSeed),
        morphSeed
      );
      rememberForm(currentForm);
      morphJar = buildMorphingJar(currentForm);
      runWaterBirth(morphJar, currentForm, () => {
        morphTimer = setTimeout(scheduleNextMorph, 200);
        prefetchNextMorph();
      });
    }

    initMorphingJar();

    gsap.to(surfaceLightAnchor.position, {
      x: 0.8,
      duration: 22,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1
    });

    // ── Render Loop ───────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const perf = {
      geoInterval: 24,
      lastGeoUpdate: 0,
      flowTime: 0
    };

    function animate() {
      const frameStart = performance.now();
      const elapsed = clock.getElapsedTime();
      const dt = Math.min(0.05, clock.getDelta());
      const now = frameStart;
      updateBirthAnimation(now);
      updateMorphAnimation(now);
      if (morphJar) {
        const targetT = elapsed * 1.15 + morphJar.timeOffset;
        perf.flowTime += (targetT - perf.flowTime) * (1 - Math.exp(-dt * 4.8));
        morphJar.outerUniforms.uTime.value = perf.flowTime;
        morphJar.outerUniforms.uLightPos.value.copy(surfaceLight.position);
        perf.geoInterval = morphState ? 28 : 32;
        if (!morphState && !birthState) {
          morphJar.outerUniforms.uBecoming.value = idleBecomingValue(elapsed);
          morphJar.innerUniforms.uBecoming.value = morphJar.outerUniforms.uBecoming.value;
        }
      }
      surfaceLight.position.copy(surfaceLightAnchor.position);
      rimLight.position.set(0, 0.5, 7);
      renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(animate);

    window.addEventListener('resize', resizeRenderSurface);
    resizeRenderSurface();
  </script>

  <script>
    const charMeanings = {
      '娥': {
        hanja: '娥',
        reading: '아 · 예쁠 娥',
        compose: ['女', '我'],
        composeLabel: '女(여자) + 我(나)',
        body: '여성성(女)과 자아(我)가 더해진 <span class="text-cyan-200">아름다움</span>. 완성된 형태가 아니라, 관찰하는 순간마다 새롭게 피어나는 생성의 언어입니다.'
      },
      '女': {
        hanja: '女',
        reading: '녀 · 계집 女',
        body: '여성성 → 유려함 → 곡선 → <span class="text-cyan-200">유기적 형태</span>. 흐르는 물처럼 부드럽게 이어지는 선.'
      },
      '我': {
        hanja: '我',
        reading: '아 · 나 我',
        body: '자아 → 창조 → 생산 → <span class="text-cyan-200">생성</span>. 자아는 끊임없이 새로운 경험과 생각을 생산하며, 본질은 유지됩니다.'
      },
      '永': {
        hanja: '永',
        reading: '영 · 길 永',
        body: '길게 이어지는 물 → 흐름 → 연결 → <span class="text-cyan-200">무한한 생성</span>. 형태는 매 순간 달라지며, 아름다움은 완성된 결과가 아니라 끊임없이 이어지는 과정입니다.'
      }
    };

    const panel = document.getElementById('meaning-panel');
    const content = document.getElementById('meaning-content');
    const charBtns = document.querySelectorAll('.char-btn');
    let activeChar = null;

    function renderMeaning(key) {
      const data = charMeanings[key];
      if (!data) return;

      let html = `
        <p class="text-[10px] tracking-[0.35em] uppercase text-cyan-300/80 mb-1">${data.reading}</p>
        <p class="font-serif text-3xl text-cyan-50 mb-2">${data.hanja}</p>
      `;

      if (data.compose) {
        html += `
          <div class="flex items-center gap-2 mb-3 text-sm text-cyan-100/90 font-serif">
            <span>획 분해</span>
            <span class="text-cyan-400/70">·</span>
            ${data.compose.map((part, i) => `
              ${i > 0 ? '<span class="text-cyan-400/70">+</span>' : ''}
              <button type="button" class="part-btn border border-cyan-300/30 rounded px-2 py-0.5 text-cyan-50 font-serif ${activeChar === part ? 'active' : ''}" data-char="${part}">${part}</button>
            `).join('')}
          </div>
        `;
      }

      html += `<p class="text-[13px] leading-relaxed text-cyan-100/90 font-serif">${data.body}</p>`;

      content.innerHTML = html;
      content.querySelectorAll('.part-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          showMeaning(btn.dataset.char);
        });
      });
    }

    function showMeaning(key) {
      if (activeChar === key) {
        hideMeaning();
        return;
      }
      activeChar = key;
      charBtns.forEach(btn => {
        const isRoot = btn.dataset.char === key || (key === '女' || key === '我') && btn.dataset.char === '娥';
        btn.classList.toggle('active', isRoot);
      });
      renderMeaning(key);
      panel.classList.add('visible');
    }

    function hideMeaning() {
      activeChar = null;
      charBtns.forEach(btn => btn.classList.remove('active'));
      panel.classList.remove('visible');
    }

    charBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showMeaning(btn.dataset.char);
      });
    });

    panel.addEventListener('click', (e) => e.stopPropagation());

    document.addEventListener('click', () => hideMeaning());
  </script>
</body>
